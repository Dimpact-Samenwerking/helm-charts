apiVersion: batch/v1
kind: Job
metadata:
  name: loki-export-measure
  namespace: monitoring
  labels:
    app: loki-export
    component: measure
    environment: ontw
    managed-by: manual
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: loki-export
        component: measure
        environment: ontw
        managed-by: manual
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: false
        fsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: measure
          # alpine/k8s mirror — ships bash+curl+jq+gzip; no apk, no public egress.
          image: acrprodmgmt.azurecr.io/k8s:1.34.7
          imagePullPolicy: IfNotPresent
          command: ["bash", "/scripts/measure.sh"]
          envFrom:
            - configMapRef:
                name: loki-export-env
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: scripts
          configMap:
            name: loki-export-scripts
            defaultMode: 0555
