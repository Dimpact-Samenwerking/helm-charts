apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-export-dump
  namespace: monitoring
  labels:
    app: loki-export
    component: dump
    environment: ontw
    managed-by: manual
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-csi
  resources:
    requests:
      # __SIZE__ is substituted by loki-dump.sh from the measured estimate.
      storage: __SIZE__Gi
