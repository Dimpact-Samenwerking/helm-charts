{{- if .Values.apisix.enabled }}
{{- /*
  oauth2-proxy in front of the APISIX embedded admin UI / Admin API.
  Validates a Keycloak session against the podiumd realm and proxies upstream
  to the in-cluster apisix-admin Service on :9180. Public hostname is exposed
  via the apisix-admin-ingress sibling template.

  Pattern modeled on the cloudbeaver oauth2-proxy used in podiumd-infra.

  Auth model (PoC): any authenticated user in the podiumd realm can log in.
  Group/role gating left as a follow-up.
*/ -}}
{{- $oauth2 := .Values.apisix.adminUi.oauth2Proxy -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apisix-oauth2-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: apisix-oauth2-proxy
    app.kubernetes.io/name: apisix-oauth2-proxy
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: apisix-oauth2-proxy
  template:
    metadata:
      labels:
        {{- include "podiumd.labels" . | nindent 8 }}
        app.kubernetes.io/component: apisix-oauth2-proxy
        app.kubernetes.io/name: apisix-oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: "{{ $oauth2.image.repository }}:{{ $oauth2.image.tag }}"
          imagePullPolicy: IfNotPresent
          args:
            - --provider=keycloak-oidc
            - --http-address=0.0.0.0:4180
            - --upstream=http://apisix-admin.{{ .Release.Namespace }}.svc.cluster.local:9180
            - --email-domain=*
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --cookie-expire=8h
            - --skip-provider-button=true
            - --pass-access-token=true
            - --pass-authorization-header=true
            - --set-xauthrequest=true
            - --whitelist-domain=$(EXTERNAL_HOST)
          env:
            - name: EXTERNAL_HOST
              valueFrom:
                secretKeyRef:
                  name: apisix-oauth2-proxy
                  key: external_host
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: apisix-oauth2-proxy
                  key: client_id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: apisix-oauth2-proxy
                  key: client_secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: apisix-oauth2-proxy
                  key: cookie_secret
            - name: OAUTH2_PROXY_OIDC_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: apisix-oauth2-proxy
                  key: oidc_issuer_url
            - name: OAUTH2_PROXY_REDIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: apisix-oauth2-proxy
                  key: redirect_url
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          resources:
            {{- toYaml $oauth2.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: apisix-oauth2-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: apisix-oauth2-proxy
    app.kubernetes.io/name: apisix-oauth2-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: apisix-oauth2-proxy
  ports:
    - name: http
      port: 80
      targetPort: 4180
      protocol: TCP
{{- end }}
