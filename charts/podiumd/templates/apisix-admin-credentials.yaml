{{- if .Values.apisix.enabled }}
{{- /*
  APISIX Admin API credentials Secret.

  Replaces the upstream chart's well-known public default keys
  (`edd1c9f034335f136f87ad84b625c8f1` / `4054f7cf07e344346cd3f287985e76a2`)
  with random 32-character values. `lookup` keeps the keys stable across
  upgrades — the random values are only generated on first install when
  no Secret exists yet.

  The umbrella chart only renders this Secret when
  `apisix.admin.credentials.secretName` matches the default name
  (`apisix-admin-credentials`). Tenants integrating with Azure Key Vault
  via the CSI driver should override `secretName` to point at their own
  Secret containing keys `admin` and `viewer`.
*/ -}}
{{- /* The upstream chart nests admin/deployment/router under a self-named
       `apisix:` key, so the umbrella path is `apisix.apisix.admin.*`. */ -}}
{{- $secretName := "apisix-admin-credentials" -}}
{{- $apisixCfg := index .Values.apisix "apisix" -}}
{{- if and $apisixCfg $apisixCfg.admin $apisixCfg.admin.credentials $apisixCfg.admin.credentials.secretName -}}
{{-   $secretName = $apisixCfg.admin.credentials.secretName -}}
{{- end -}}
{{- if eq $secretName "apisix-admin-credentials" -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $admin := "" -}}
{{- $viewer := "" -}}
{{- if $existing -}}
{{-   $admin = index $existing.data "admin" | b64dec -}}
{{-   $viewer = index $existing.data "viewer" | b64dec -}}
{{- else -}}
{{-   $admin = randAlphaNum 32 -}}
{{-   $viewer = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: apisix
type: Opaque
stringData:
  admin: {{ $admin | quote }}
  viewer: {{ $viewer | quote }}
{{- end }}
{{- end }}
