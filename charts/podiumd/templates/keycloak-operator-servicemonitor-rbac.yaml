{{- if (index .Values "keycloak-operator").enabled }}
{{/*
  Keycloak Operator 26.x always checks at startup whether the ServiceMonitor CRD
  (monitoring.coreos.com/v1) is installed, by attempting a watch on the resource.
  If the operator's ServiceAccount has no permission for that API group, Kubernetes
  returns HTTP 403 instead of 404, which the operator treats as a hard error and
  aborts the entire reconciliation — no Keycloak pods are ever created.

  The ClusterRole + ClusterRoleBinding below grants cluster-wide read access so the
  operator receives a proper 404 (API group unknown) when the CRD is absent, allowing
  reconciliation to continue.

  The Role + RoleBinding below grants write access in the release namespace so the
  operator can create and manage the ServiceMonitor for Keycloak metrics when the
  monitoring.coreos.com CRD is present.

  SA name derivation mirrors the adfinis keycloak-operator chart logic:
    1. operator.serviceAccount.name if explicitly set
    2. fullnameOverride if set
    3. <release>-keycloak-operator (default fullname)
*/}}
{{- $kcOp := index .Values "keycloak-operator" }}
{{- $saName := "" }}
{{- if and $kcOp.operator.serviceAccount $kcOp.operator.serviceAccount.name }}
{{-   $saName = $kcOp.operator.serviceAccount.name }}
{{- else if $kcOp.fullnameOverride }}
{{-   $saName = $kcOp.fullnameOverride }}
{{- else }}
{{-   $saName = printf "%s-keycloak-operator" .Release.Name }}
{{- end }}
---
# Cluster-wide read access — allows the operator to detect CRD absence gracefully.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-keycloak-operator-servicemonitor-view
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-operator
rules:
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - servicemonitors
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-keycloak-operator-servicemonitor-view
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-keycloak-operator-servicemonitor-view
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ .Release.Namespace }}
{{- if $kcOp.enableServiceMonitor }}
---
# Namespace-scoped write access — allows the Keycloak Operator pod to
# create and manage the Keycloak ServiceMonitor in the release namespace
# when the monitoring.coreos.com CRD is present. Only rendered when
# keycloak-operator.enableServiceMonitor: true.
#
# The operator's `keycloakcontroller-cluster-role` does NOT grant
# servicemonitors permissions (see adfinis/keycloak-operator chart 1.11.4),
# so without this binding the operator hits 403 on PATCH and the Keycloak
# CR stays InProgress, blocking the entire deploy.
#
# Subject is the operator SA (resolved via $saName, which honours the
# adfinis fullnameOverride / serviceAccount.name chain). The conditional
# extra subject below adds a redundant `keycloak` literal as defence in
# depth for edge cases where fullnameOverride is overridden to something
# other than "keycloak" — under default values it is the same SA and the
# block renders nothing.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-keycloak-operator-servicemonitor-write
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-operator
rules:
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - servicemonitors
    verbs:
      - create
      - patch
      - update
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-keycloak-operator-servicemonitor-write
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-keycloak-operator-servicemonitor-write
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ .Release.Namespace }}
{{- if ne $saName "keycloak" }}
  - kind: ServiceAccount
    name: keycloak
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
{{- end }}
