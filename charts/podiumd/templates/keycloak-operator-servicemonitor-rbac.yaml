{{- if (index .Values "keycloak-operator").enabled }}
{{/*
  Keycloak Operator 26.x manages ServiceMonitor resources as part of reconciliation.
  The operator's ServiceAccount needs full CRUD access to servicemonitors in the
  monitoring.coreos.com API group. Without it, reconciliation fails with HTTP 403
  and the Keycloak CR is stuck in HasErrors=True / Ready=Unknown.

  When the ServiceMonitor CRD is absent, these permissions cause the API server to
  return HTTP 404 (API group unknown) rather than 403, allowing reconciliation to
  continue gracefully.

  SA name derivation mirrors the adfinis keycloak-operator chart logic:
    1. operator.serviceAccount.name if explicitly set
    2. fullnameOverride if set
    3. <release>-keycloak-operator (default fullname)
*/}}
{{- $kcOp := index .Values "keycloak-operator" }}
{{- $saName := "" }}
{{- if and $kcOp.operator.serviceAccount $kcOp.operator.serviceAccount.name }}
{{-   $saName = $kcOp.operator.serviceAccount.name }}
{{- else if $kcOp.fullnameOverride }}
{{-   $saName = $kcOp.fullnameOverride }}
{{- else }}
{{-   $saName = printf "%s-keycloak-operator" .Release.Name }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-keycloak-operator-servicemonitor
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-operator
rules:
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - servicemonitors
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-keycloak-operator-servicemonitor
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-keycloak-operator-servicemonitor
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ .Release.Namespace }}
{{- end }}
