{{- $redisOperator := index .Values "redis-operator" }}
{{- $redisHa := index $redisOperator "redis-ha" }}
{{- if $redisOperator.enabled }}
{{- if $redisHa.labelMasterCronJob.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-ha-label-master
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: redis-ha-label-master
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["redis.redis.opstreelabs.in"]
    resources: ["redisreplications"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redis-ha-label-master
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: redis-ha-label-master
subjects:
  - kind: ServiceAccount
    name: redis-ha-label-master
    namespace: {{ .Release.Namespace }}
---
# Workaround for redis-operator 0.24.0 bug (OT-CONTAINER-KIT/redis-operator PR #1720, not yet
# released): when all redis-ha pods restart simultaneously the operator passes an empty pod name
# to getRedisServerIP(), loops with "resource name may not be empty", and never applies
# redis-role labels. Without the labels the redis-ha-master Service has no endpoints and all
# dependent apps (openzaak, ZAC, etc.) hang on first Redis connection.
# Remove this CronJob once a redis-operator release containing PR #1720 is available.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: redis-ha-label-master
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
spec:
  schedule: {{ $redisHa.labelMasterCronJob.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      backoffLimit: 0
      template:
        metadata:
          labels:
            {{- include "podiumd.labels" . | nindent 12 }}
        spec:
          serviceAccountName: redis-ha-label-master
          automountServiceAccountToken: true
          restartPolicy: Never
          {{- with $redisHa.labelMasterCronJob.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: label-master
              image: {{ include "podiumd.image" $redisHa.labelMasterCronJob.image }}
              resources:
                {{- toYaml $redisHa.labelMasterCronJob.resources | nindent 16 }}
              securityContext:
                runAsNonRoot: true
                runAsUser: 65532
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  NAMESPACE="{{ .Release.Namespace }}"
                  CR_NAME="redis-ha"

                  # Resolve master from RedisReplication CR status — authoritative even when
                  # the operator's reconciliation loop is failing (bug PR #1720).
                  MASTER=$(kubectl get redisreplication "$CR_NAME" \
                    -n "$NAMESPACE" \
                    -o jsonpath='{.status.masterNode}' 2>/dev/null || true)

                  if [ -z "$MASTER" ]; then
                    echo "ERROR: status.masterNode not set in RedisReplication CR. Cannot reconcile."
                    exit 1
                  fi

                  # Check whether labels already reflect the CR — skip API writes if so.
                  CURRENT=$(kubectl get pod -l "app=redis-ha,redis-role=master" \
                    -n "$NAMESPACE" \
                    -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

                  if [ "$CURRENT" = "$MASTER" ]; then
                    echo "Labels correct: $MASTER is master. Nothing to do."
                    exit 0
                  fi

                  echo "Label mismatch (labeled: '${CURRENT:-none}', CR says: $MASTER). Reconciling..."

                  kubectl label pod "$MASTER" \
                    -n "$NAMESPACE" redis-role=master --overwrite

                  PODS=$(kubectl get pod -l app=redis-ha \
                    -n "$NAMESPACE" \
                    -o jsonpath='{.items[*].metadata.name}')
                  for POD in $PODS; do
                    if [ "$POD" != "$MASTER" ]; then
                      kubectl label pod "$POD" \
                        -n "$NAMESPACE" redis-role=slave --overwrite
                    fi
                  done

                  echo "Done. $MASTER labeled as master."
          volumes:
            - name: tmp
              emptyDir: {}
{{- end }}
{{- end }}
