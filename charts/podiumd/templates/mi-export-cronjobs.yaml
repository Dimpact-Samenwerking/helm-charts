{{- if .Values.mi.enabled }}
{{- $mi := .Values.mi }}
{{- $root := . }}
{{- $format := default "csv" $mi.format }}
{{- if not (has $format (list "csv" "pgdump")) }}
  {{- fail (printf "mi.format must be one of: csv, pgdump (got %q)" $format) }}
{{- end }}

{{- /*
  SFTP egress required-field guards. When testMode is on, the chart renders
  the connection Secret itself from testMode.* values, so the only operator-
  facing requirement is that the keypair/known_hosts are non-empty. When
  testMode is off, all four prod SFTP parameters must come from values
  (they are templated into env entries below).
*/}}
{{- if $mi.sftp.testMode.enabled }}
{{- $_ := required "mi.sftp.testMode.privateKey is required when mi.sftp.testMode.enabled is true" $mi.sftp.testMode.privateKey }}
{{- $_ := required "mi.sftp.testMode.knownHosts is required when mi.sftp.testMode.enabled is true" $mi.sftp.testMode.knownHosts }}
{{- end }}
{{- $_ := required "mi.sftp.host is required when mi.enabled is true"       $mi.sftp.host }}
{{- $_ := required "mi.sftp.user is required when mi.enabled is true"       $mi.sftp.user }}
{{- $_ := required "mi.sftp.remotePath is required when mi.enabled is true" $mi.sftp.remotePath }}

{{- /*
  One CronJob per entry in mi.targets[]. Each entry is gated on the chart's
  existing <component>.enabled flag, so an MI export only renders for apps
  this chart is actively deploying. Disabling a component (or its mi target)
  removes the corresponding CronJob.
*/}}
{{- range $t := $mi.targets }}
{{- $componentValues := index $root.Values $t.component | default dict }}
{{- $componentEnabled := dig "enabled" false $componentValues }}
{{- $targetEnabled    := dig "enabled" true  $t }}
{{- if and $componentEnabled $targetEnabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mi-export-{{ $t.component }}
  labels:
    {{- include "podiumd.labels" $root | nindent 4 }}
    app.kubernetes.io/component: mi-export
    mi.podiumd.dimpact.nl/target: {{ $t.component | quote }}
spec:
  schedule: {{ $mi.schedule | quote }}
  timeZone: {{ $mi.timeZone | quote }}
  concurrencyPolicy: {{ $mi.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ $mi.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ $mi.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: {{ $mi.ttlSecondsAfterFinished }}
      backoffLimit: 0
      template:
        metadata:
          labels:
            {{- include "podiumd.labels" $root | nindent 12 }}
            app.kubernetes.io/component: mi-export
            mi.podiumd.dimpact.nl/target: {{ $t.component | quote }}
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          {{- with $mi.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: dump
              image: {{ include "podiumd.image" $mi.image }}
              imagePullPolicy: IfNotPresent
              resources:
                {{- toYaml $mi.resources | nindent 16 }}
              securityContext:
                # iter3-todo: bake a purpose-built image (psql + openssh-clients
                # installed at build time), then re-enable runAsNonRoot/
                # runAsUser:1000 and readOnlyRootFilesystem. Today we need root
                # because the runtime tdnf bootstrap requires it.
                runAsNonRoot: false
                runAsUser: 0
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              env:
                - name: MI_GEMEENTE
                  value: {{ required "mi.gemeente is required" $mi.gemeente | quote }}
                - name: MI_COMPONENT
                  value: {{ $t.component | quote }}
                - name: MI_SCHEMAS
                  value: {{ default (list "public") $t.schemas | join " " | quote }}
                - name: MI_FORMAT
                  value: {{ $format | quote }}
                # SFTP key material is mounted at /etc/sftp via the
                # `sftp-key` volume below. The script reads these env paths
                # rather than hardcoding /etc/sftp so an iter3 baked image
                # can relocate them without changing dump.sh.
                - name: SFTP_KEY_FILE
                  value: /etc/sftp/id
                - name: SFTP_KNOWN_HOSTS
                  value: /etc/sftp/known_hosts
              envFrom:
                # SFTP connection envs (SFTP_HOST/PORT/USER/REMOTE_PATH).
                # In prod, this Secret is provisioned by the env's Terraform
                # from Key Vault. In testMode, mi-export-sftp-testkey-secret.yaml
                # renders it from values.
                - secretRef:
                    name: {{ $mi.sftp.secretName | quote }}
                # The chart's per-app convention is: <component> Secret carries DB_PASSWORD
                # (and other app secrets); <component> ConfigMap carries DB_HOST, DB_NAME,
                # DB_USER, DB_PORT. Both default to the target's component name; override
                # secretName/configMapName per-target only when the chart subchart key
                # differs from the K8s resource name (e.g. opennotificaties → notificaties).
                - secretRef:
                    name: {{ default $t.component $t.secretName | quote }}
                - configMapRef:
                    name: {{ default $t.component $t.configMapName | quote }}
              command: ["/bin/sh", "-c"]
              args:
                - exec /bin/bash /scripts/dump.sh
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: sftp-key
                  mountPath: /etc/sftp
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: scripts
              configMap:
                name: mi-export-scripts
                defaultMode: 0555
            - name: sftp-key
              secret:
                secretName: {{ $mi.sftp.keySecretName | quote }}
                # 0400 — sshd refuses to use a key whose perms are loose.
                defaultMode: 0400
                items:
                  - key: id
                    path: id
                  - key: known_hosts
                    path: known_hosts
            - name: tmp
              # 20 GiB scratch cap. Backed by node ephemeral storage. Sized to
              # match mi.resources.{requests,limits}.ephemeral-storage so the
              # pod is evicted (not the node) if a dump exceeds budget.
              emptyDir:
                sizeLimit: 20Gi
{{- end }}
{{- end }}
{{- end }}
