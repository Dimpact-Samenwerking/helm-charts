{{- if .Values.apisix.enabled }}
{{- /*
  Secret consumed by the apisix-oauth2-proxy Deployment.

  Field sources:
    * client_id        — fixed: matches the Keycloak realm client `apisix-dashboard`
    * client_secret    — auto-generated, mirrored from keycloak-podiumd-realm-secrets
                         (key: apisix-dashboard-oidc-secret) so APISIX, Keycloak and
                         oauth2-proxy share the same value.
    * cookie_secret    — random 32-byte AES key, stable across upgrades via lookup.
    * oidc_issuer_url  — derived from keycloak.config.realmFrontendUrl + realm.
    * external_host    — apisix.adminUi.hostname.
    * redirect_url     — https://${external_host}/oauth2/callback.
*/ -}}
{{- $hostname := .Values.apisix.adminUi.hostname | default "" -}}
{{- if eq $hostname "" -}}
{{-   fail "apisix.adminUi.hostname is required when apisix.enabled=true (e.g. apisix-admin.${envName}.pd.test-rig.nl)" -}}
{{- end -}}
{{- $realm := .Values.keycloak.config.realm -}}
{{- $realmUrl := .Values.keycloak.config.realmFrontendUrl | trimSuffix "/" -}}
{{- $issuer := printf "%s/realms/%s" $realmUrl $realm -}}
{{- $redirect := printf "https://%s/oauth2/callback" $hostname -}}
{{- $clientSecret := "" -}}
{{- $existingRealm := lookup "v1" "Secret" .Release.Namespace "keycloak-podiumd-realm-secrets" -}}
{{- with $existingRealm -}}
{{-   $clientSecret = index .data "apisix-dashboard-oidc-secret" | default "" | b64dec -}}
{{- end -}}
{{- if eq $clientSecret "" -}}
{{- /* keycloak-podiumd-realm-secrets is rendered in this same release — fall back
       to the same lookup-or-generate logic so first-install ordering is safe. */ -}}
{{-   $clientSecret = randAlphaNum 32 -}}
{{- end -}}
{{- $cookieSecret := "" -}}
{{- $existingProxy := lookup "v1" "Secret" .Release.Namespace "apisix-oauth2-proxy" -}}
{{- with $existingProxy -}}
{{-   $cookieSecret = index .data "cookie_secret" | default "" | b64dec -}}
{{- end -}}
{{- if eq $cookieSecret "" -}}
{{-   $cookieSecret = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: apisix-oauth2-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: apisix-oauth2-proxy
type: Opaque
stringData:
  client_id: "apisix-dashboard"
  client_secret: {{ $clientSecret | quote }}
  cookie_secret: {{ $cookieSecret | quote }}
  oidc_issuer_url: {{ $issuer | quote }}
  redirect_url: {{ $redirect | quote }}
  external_host: {{ $hostname | quote }}
{{- end }}
