{{- /*
  Dev/test-only Secrets for the MI export SFTP egress.

  Renders only when BOTH `mi.enabled` and `mi.sftp.testMode.enabled` are true.
  Produces two Secrets in-chart that the CronJob would otherwise expect to
  find pre-provisioned (in prod they come from Azure Key Vault via the env's
  Terraform / sync script):

    1. `<mi.sftp.secretName>`        — connection envvars
    2. `<mi.sftp.keySecretName>`     — private key + known_hosts

  **Never enable testMode in production values.** A prod values file with
  `mi.sftp.testMode.enabled: true` would leak the inlined private key into
  the cluster and the rendered manifests. The CronJob template enforces
  `required` on testMode.privateKey + testMode.knownHosts so a half-filled
  config fails fast.
*/}}
{{- if and .Values.mi.enabled .Values.mi.sftp.testMode.enabled }}
{{- $mi := .Values.mi }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $mi.sftp.secretName | quote }}
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: mi-export
    mi.podiumd.dimpact.nl/test-only: "true"
type: Opaque
stringData:
  SFTP_HOST: {{ $mi.sftp.host | quote }}
  SFTP_PORT: {{ $mi.sftp.port | quote }}
  SFTP_USER: {{ $mi.sftp.user | quote }}
  SFTP_REMOTE_PATH: {{ $mi.sftp.remotePath | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $mi.sftp.keySecretName | quote }}
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: mi-export
    mi.podiumd.dimpact.nl/test-only: "true"
type: Opaque
stringData:
  id: |
    {{- $mi.sftp.testMode.privateKey | nindent 4 }}
  known_hosts: |
    {{- $mi.sftp.testMode.knownHosts | nindent 4 }}
{{- end }}
