{{- if (index .Values "keycloak-operator").enabled -}}
{{- if (index .Values "keycloak-operator").jobs.importPodiumdRealm.enabled -}}
{{- /*
  Resolve each component OIDC secret:
  - Use the configured value when set (enabled component with real secret).
  - When empty (disabled component), preserve the value from the existing Secret so it
    stays stable across upgrades. On first deploy (no Secret yet), generate a random
    32-character secret so the Keycloak client entry is usable if the component is
    enabled later.
*/ -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace "keycloak-podiumd-realm-secrets" -}}
{{- $oidcSecrets := dict -}}
{{- range $pair := list
  (list "openzaak"          "openzaak-oidc-secret")
  (list "openarchiefbeheer" "openarchiefbeheer-oidc-secret")
  (list "opennotificaties"  "opennotificaties-oidc-secret")
  (list "objecten"          "objecten-oidc-secret")
  (list "objecttypen"       "objecttypen-oidc-secret")
  (list "openklant"         "openklant-oidc-secret")
  (list "openformulieren"   "openformulieren-oidc-secret")
  (list "openinwoner"       "openinwoner-oidc-secret")
  (list "referentielijsten" "referentielijsten-oidc-secret")
  (list "openbeheer"        "openbeheer-oidc-secret") -}}
{{- $comp        := index $pair 0 -}}
{{- $key         := index $pair 1 -}}
{{- $cfgVals     := index (index $.Values $comp) "configuration" | default dict -}}
{{- $secretsVals := index $cfgVals "secrets" | default dict -}}
{{- $val         := index $secretsVals "keycloak_client_secret" | default "" -}}
{{- if eq $val "" -}}
{{- $existingVal := "" -}}
{{- with $existing -}}{{- $existingVal = index .data $key | default "" | b64dec -}}{{- end -}}
{{- if eq $existingVal "" -}}{{- $val = randAlphaNum 32 -}}{{- else -}}{{- $val = $existingVal -}}{{- end -}}
{{- end -}}
{{- $_ := set $oidcSecrets $key $val -}}
{{- end -}}
# All Keycloak OIDC client secrets for the podiumd realm.
# These are injected into the kc-config-cli container as environment variables
# and referenced from keycloak-podiumd-realm-config via $(KC_SECRET_*) substitution,
# so that plaintext secrets never appear in the ConfigMap.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-podiumd-realm-secrets
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-config-cli
type: Opaque
stringData:
  openzaak-oidc-secret: {{ get $oidcSecrets "openzaak-oidc-secret" | quote }}
  openarchiefbeheer-oidc-secret: {{ get $oidcSecrets "openarchiefbeheer-oidc-secret" | quote }}
  monitoring-client-secret: {{ .Values.keycloak.config.clients.monitoring.secret | quote }}
  opennotificaties-oidc-secret: {{ get $oidcSecrets "opennotificaties-oidc-secret" | quote }}
  objecten-oidc-secret: {{ get $oidcSecrets "objecten-oidc-secret" | quote }}
  objecttypen-oidc-secret: {{ get $oidcSecrets "objecttypen-oidc-secret" | quote }}
  openklant-oidc-secret: {{ get $oidcSecrets "openklant-oidc-secret" | quote }}
  openformulieren-oidc-secret: {{ get $oidcSecrets "openformulieren-oidc-secret" | quote }}
  openinwoner-oidc-secret: {{ get $oidcSecrets "openinwoner-oidc-secret" | quote }}
  referentielijsten-oidc-secret: {{ get $oidcSecrets "referentielijsten-oidc-secret" | quote }}
  openbeheer-oidc-secret: {{ get $oidcSecrets "openbeheer-oidc-secret" | quote }}
  kiss-oidc-secret: {{ .Values.kiss.settings.oidc.clientSecret | quote }}
  zac-auth-secret: {{ .Values.zac.auth.secret | quote }}
  zac-keycloak-admin-secret: {{ .Values.zac.keycloak.adminClient.secret | quote }}
  ita-oidc-secret: {{ .Values.ita.web.oidc.clientSecret | quote }}
  pabc-oidc-secret: {{ .Values.pabc.settings.oidc.clientSecret | quote }}
  pabc-keycloak-admin-secret: {{ .Values.pabc.settings.keycloakAdmin.clientSecret | quote }}
{{- end -}}
{{- end -}}
