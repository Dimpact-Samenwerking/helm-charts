        redirectUris:
          - "{{ .Values.zac.contextUrl | trimSuffix "/" }}/*"
        webOrigins:
          - "{{ .Values.zac.contextUrl | trimSuffix "/" }}/*"
        secret: $(KC_SECRET_ZAC)
        protocolMappers:
          - name: "username"
            protocol: "openid-connect"
            protocolMapper: oidc-usermodel-property-mapper
            config:
              introspection.token.claim: "true"
              userinfo.token.claim: "true"
              user.attribute: "username"
              id.token.claim: "true"
              lightweight.claim: "false"
              access.token.claim: "true"
              claim.name: "preferred_username"
              jsonType.label: "String"
          - name: "groups-member"
            protocol: "openid-connect"
            protocolMapper: "oidc-group-membership-mapper"
            consentRequired: false
            config:
              full.path: "false"
              introspection.token.claim: "true"
              userinfo.token.claim: "true"
              multivalued: "true"
              id.token.claim: "true"
              lightweight.claim: "false"
              access.token.claim: "true"
              claim.name: "group_membership"
      - clientId: {{ .Values.zac.keycloak.adminClient.id }}
        name: Zaakafhandelcomponent Admin Client
        enabled: true
        clientAuthenticatorType: client-secret
        secret: $(KC_SECRET_ZAC_ADMIN)
        redirectUris:
          - "{{ .Values.zac.contextUrl | trimSuffix "/" }}/*"
        webOrigins:
          - "{{ .Values.zac.contextUrl | trimSuffix "/" }}/*"
        serviceAccountsEnabled: true
        protocolMappers:
          - name: "Client Host"
            protocol: "openid-connect"
            protocolMapper: "oidc-usersessionmodel-note-mapper"
            consentRequired: false
            config:
              user.session.note: "clientHost"
              id.token.claim: "true"
              introspection.token.claim: "true"
              access.token.claim: "true"
              claim.name: "clientHost"
              jsonType.label: "String"
          - name: "Client IP Address"
            protocol: "openid-connect"
            protocolMapper: "oidc-usersessionmodel-note-mapper"
            consentRequired: false
            config:
              user.session.note: "clientAddress"
              id.token.claim: "true"
              introspection.token.claim: "true"
              access.token.claim: "true"
              claim.name: "clientAddress"
              jsonType.label: "String"
          - name: "Client ID"
            protocol: "openid-connect"
            protocolMapper: "oidc-usersessionmodel-note-mapper"
            consentRequired: false
            config:
              user.session.note: "client_id"
              id.token.claim: "true"
              introspection.token.claim: "true"
              access.token.claim: "true"
              claim.name: "client_id"
              jsonType.label: "String"
      - clientId: ita
        name: Interne Taak Afhandeling
        enabled: true
        clientAuthenticatorType: client-secret
{{- if .Values.ita.web.oidc.pkceEnabled }}
        pkceCodeChallengeMethod: S256
{{- end }}
        redirectUris:
          - "{{ .Values.ita.web.oidc.frontendUrl | trimSuffix "/" }}/*"
        webOrigins:
          - "{{ .Values.ita.web.oidc.frontendUrl | trimSuffix "/" }}/*"
        secret: $(KC_SECRET_ITA)
        protocolMappers:
          - name: "client roles"
            protocol: "openid-connect"
            protocolMapper: "oidc-usermodel-client-role-mapper"
            consentRequired: false
            config:
              introspection.token.claim: "true"
              multivalued: "true"
              userinfo.token.claim: "false"
              id.token.claim: "true"
              user.attribute: "foo"
              lightweight.claim: "false"
              access.token.claim: "true"
              claim.name: "roles"
              jsonType.label: "String"
              usermodel.clientRoleMapping.clientId: "ita"
          - name: "samaccountname"
            protocol: "openid-connect"
            protocolMapper: "oidc-usermodel-attribute-mapper"
            config:
              introspection.token.claim: "true"
              userinfo.token.claim: "true"
              user.attribute: "samaccountname"
              id.token.claim: "true"
              lightweight.claim: "false"
              access.token.claim: "true"
              claim.name: "samaccountname"
              jsonType.label: "String"
      - clientId: {{ .Values.pabc.settings.oidc.clientId }}
        name: PABC OIDC Client
        enabled: true
        clientAuthenticatorType: client-secret
{{- if .Values.pabc.settings.oidc.pkceEnabled }}
        pkceCodeChallengeMethod: S256
{{- end }}
        redirectUris:
          - "{{ .Values.pabc.settings.oidc.oidcUrl | trimSuffix "/" }}/*"
        webOrigins:
          - "{{ .Values.pabc.settings.oidc.oidcUrl | trimSuffix "/" }}/*"
        secret: $(KC_SECRET_PABC)
        protocolMappers:
          - name: "client roles"
            protocol: "openid-connect"
            protocolMapper: "oidc-usermodel-client-role-mapper"
            consentRequired: false
            config:
              introspection.token.claim: "true"
              multivalued: "true"
              userinfo.token.claim: "false"
              id.token.claim: "true"
              user.attribute: "foo"
              lightweight.claim: "false"
              access.token.claim: "true"
              claim.name: "roles"
              jsonType.label: "String"
              usermodel.clientRoleMapping.clientId: "pabc"
      - clientId: {{ .Values.pabc.settings.keycloakAdmin.clientId }}
        name: PABC Keycloak Admin REST API client
        enabled: true
        clientAuthenticatorType: client-secret
        secret: $(KC_SECRET_PABC_ADMIN)
        serviceAccountsEnabled: true
{{- if .Values.apisix.enabled }}
      - clientId: apisix-dashboard
        name: APISIX Dashboard
        description: OIDC client used by oauth2-proxy in front of the APISIX embedded Admin UI to authenticate operator browser sessions.
        enabled: true
        clientAuthenticatorType: client-secret
        secret: $(KC_SECRET_APISIX_DASHBOARD)
        # Standard authorization-code flow for the dashboard browser session.
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: false
        publicClient: false
        # Redirects come back to the public oauth2-proxy callback path. The proxy
        # then validates the session and forwards to apisix-admin:9180 in-cluster.
        # apisix.adminUi.hostname is required when apisix.enabled=true, so this
        # is non-empty whenever this client block is rendered.
        redirectUris:
          - "https://{{ .Values.apisix.adminUi.hostname }}/oauth2/callback"
          - "http://localhost:8080/oauth2/callback"
        webOrigins:
          - "+"
        protocolMappers:
          - name: "username"
            protocol: "openid-connect"
            protocolMapper: oidc-usermodel-property-mapper
            config:
              introspection.token.claim: "true"
              userinfo.token.claim: "true"
              user.attribute: "username"
              id.token.claim: "true"
              lightweight.claim: "false"
              access.token.claim: "true"
              claim.name: "preferred_username"
              jsonType.label: "String"
          - name: "groups"
            protocol: "openid-connect"
            protocolMapper: "oidc-group-membership-mapper"
            consentRequired: false
            config:
              introspection.token.claim: "true"
              userinfo.token.claim: "true"
              id.token.claim: "true"
              access.token.claim: "true"
              claim.name: "groups"
              full.path: "false"
{{- end }}
    clientScopes:
      - name: roles
        description: OpenID Connect scope for add user roles to the access token
        protocol: openid-connect
        protocolMappers:
          - config:
              access.token.claim: "true"
              claim.name: roles
              id.token.claim: "false"
              introspection.token.claim: "false"
              jsonType.label: String
              lightweight.claim: "false"
              multivalued: "true"
              userinfo.token.claim: "false"
              usermodel.clientRoleMapping.clientId: {{ .Values.zac.auth.clientId }}
            consentRequired: false
            name: zac roles
            protocol: openid-connect
            protocolMapper: oidc-usermodel-client-role-mapper
          - config:
              access.token.claim: "true"
              introspection.token.claim: "true"
            consentRequired: false
            name: audience resolve
            protocol: openid-connect
            protocolMapper: oidc-audience-resolve-mapper
          - config:
              access.token.claim: "true"
              claim.name: resource_access.${client_id}.roles
              introspection.token.claim: "true"
              jsonType.label: String
              multivalued: "true"
              user.attribute: foo
            consentRequired: false
            name: client roles
            protocol: openid-connect
            protocolMapper: oidc-usermodel-client-role-mapper
          - config:
              access.token.claim: "true"
              claim.name: realm_access.roles
              introspection.token.claim: "true"
              jsonType.label: String
              multivalued: "true"
              user.attribute: foo
            consentRequired: false
            name: realm roles
            protocol: openid-connect
            protocolMapper: oidc-usermodel-realm-role-mapper
    users:
      - username: "service-account-{{ .Values.zac.keycloak.adminClient.id }}"
        enabled: "true"
        totp: "false"
        serviceAccountClientId: "{{ .Values.zac.keycloak.adminClient.id }}"
        clientRoles:
          realm-management:
            - "view-users"
          account:
            - "view-groups"
      - username: "service-account-{{ .Values.pabc.settings.keycloakAdmin.clientId }}"
        enabled: "true"
        totp: "false"
        serviceAccountClientId: "{{ .Values.pabc.settings.keycloakAdmin.clientId }}"
        clientRoles:
          realm-management:
            - "view-users"
            - "view-realm"
          account:
            - "view-groups"
{{- if .Values.openbao.enabled }}
      - username: {{ .Values.openbao.configuration.testUser.username | quote }}
        enabled: "true"
        emailVerified: "true"
        firstName: Vault
        lastName: Tester
        email: {{ .Values.openbao.configuration.testUser.email | quote }}
        groups:
          - "/{{ .Values.openbao.configuration.uploadersGroup }}"
        credentials:
          - type: password
            value: "$(KC_OPENBAO_TEST_USER_PASSWORD)"
            temporary: "false"
{{- end }}
{{- if .Values.keycloak.config.superuser.enabled }}
      # Per-app superusers: su-<client>, each with ONLY that app's admin role(s).
      # Keeps each user's OIDC token small (one client's resource_access) so the
      # BFF auth cookie stays under the gateway proxy buffer. Shared password
      # auto-generated + kept stable in keycloak-podiumd-realm-secrets
      # (key keycloak-superuser-password) unless set via values.
{{- $domain := .Values.keycloak.config.superuser.emailDomain | default "example.nl" }}
{{- $apps := dict
      "abc" (list "administrators")
      "openklant" (list "administrators")
      "objecten" (list "administrators")
      "objecttypen" (list "administrators")
      "openzaak" (list "administrators")
      "opennotificaties" (list "administrators")
      "openformulieren" (list "administrators")
      "openinwoner" (list "administrators")
      "referentielijsten" (list "administrators")
      "openbeheer" (list "administrators")
      "kiss" (list "Redacteur" "Klantcontactmedewerker" "Kennisbank")
      "zac" (list "behandelaar" "beheerder" "coordinator" "raadpleger" "recordmanager" "domein_elk_zaaktype")
      "pabc" (list "administrator") }}
{{- if .Values.keycloak.config.clients.monitoring.enabled }}{{- $_ := set $apps "monitoring" (list "admin") }}{{- end }}
{{- if .Values.ita.enabled }}{{- $_ := set $apps "ita" (list "ITA_Gebruiker" "ITA_Functioneel_Beheerder") }}{{- end }}
{{- if .Values.openbao.enabled }}{{- $_ := set $apps "openbao" (list "uploaders") }}{{- end }}
{{- if .Values.zaakbrug.enabled }}{{- $_ := set $apps "zaakbrug" (list "administrators" "zaakbrug_admin" "dataadmin") }}{{- end }}
{{- range $app, $roles := $apps }}
      - username: su-{{ $app }}
        enabled: "true"
        emailVerified: "true"
        firstName: Superuser
        lastName: {{ $app | quote }}
        email: su-{{ $app }}@{{ $domain }}
        credentials:
          - type: password
            value: "$(KC_SUPERUSER_PASSWORD)"
            temporary: "false"
        clientRoles:
          {{ $app }}:
{{- range $roles }}
            - {{ . }}
{{- end }}
{{- end }}
{{- end }}
    smtpServer:
      starttls: {{ .Values.keycloak.config.smtp.starttls }}
      port: {{ .Values.keycloak.config.smtp.port }}
      host: {{ .Values.keycloak.config.smtp.server }}
      from: {{ .Values.keycloak.config.smtp.from }}
      fromDisplayName: {{ .Values.keycloak.config.smtp.fromDisplayName }}
      ssl: {{ .Values.keycloak.config.smtp.ssl }}
    {{- if not .Values.keycloak.config.skipRoles }}
    roles:
      realm:
        - name: podiumd-admin
          description: PodiumD Administrator
      client:
        abc:
          - name: administrators
        monitoring:
          - name: admin
          - name: editor
          - name: viewer
        openklant:
          - name: administrators
        objecten:
          - name: administrators
        objecttypen:
          - name: administrators
        openzaak:
          - name: administrators
        opennotificaties:
          - name: administrators
        openformulieren:
          - name: administrators
        openinwoner:
          - name: administrators
        referentielijsten:
          - name: administrators
        openbeheer:
          - name: administrators
        openbao:
          - name: uploaders
        kiss:
          - name: Redacteur
          - name: Klantcontactmedewerker
          - name: Kennisbank
        zac:
          - name: behandelaar
          - name: beheerder
          - name: coordinator
          - name: raadpleger
          - name: recordmanager
          - name: domein_elk_zaaktype
        ita:
          - name: ITA_Gebruiker
          - name: ITA_Functioneel_Beheerder
        pabc:
          - name: administrator
{{- if .Values.zaakbrug.enabled }}
        zaakbrug:
          - name: administrators
          - name: zaakbrug_admin
          - name: dataadmin
{{- end }}
    {{- end }}
    {{- if not .Values.keycloak.config.skipGroups }}
    groups:
      - name: administrators
        path: /administrators
        attributes:
          description:
            - "Administrators"
        realmRoles:
          - "podiumd-admin"
        clientRoles:
          zac:
            - "recordmanager"
            - "domein_elk_zaaktype"
            - "beheerder"
            - "coordinator"
            - "raadpleger"
            - "behandelaar"
          abc:
            - "administrators"
          ita:
            - "ITA_Gebruiker"
            - "ITA_Functioneel_Beheerder"
          monitoring:
            - "admin"
          objecten:
            - "administrators"
          objecttypen:
            - "administrators"
          openzaak:
            - "administrators"
          openklant:
            - "administrators"
          openformulieren:
            - "administrators"
          openinwoner:
            - "administrators"
          opennotificaties:
            - "administrators"
          referentielijsten:
            - "administrators"
          openbeheer:
            - "administrators"
          pabc:
            - "administrator"
{{- if .Values.zaakbrug.enabled }}
          zaakbrug:
            - "administrators"
{{- end }}
      - name: "behandelaars"
        path: "/behandelaars"
        attributes:
          description:
            - "Behandelaars"
        clientRoles:
          zac:
            - "domein_elk_zaaktype"
