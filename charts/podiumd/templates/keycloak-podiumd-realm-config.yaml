{{- if (index .Values "keycloak-operator").enabled -}}
{{- if (index .Values "keycloak-operator").jobs.importPodiumdRealm.enabled -}}
{{- /* PKCE consistency validation: if pkceEnabled=true on the Keycloak client and configuration.data
     is non-empty, the application must also have oidc_use_pkce: true in configuration.data.
     If configuration.data is empty, validation is skipped — it is the responsibility of the
     configuration maintainer to ensure oidc_use_pkce: true is set when data is filled in.
     See keycloak-security-updates.md § PKCE Enforcement. */ -}}
{{- $djangoApps := list
  (dict "name" "openzaak"         "pkce" .Values.openzaak.configuration.pkceEnabled         "data" .Values.openzaak.configuration.data)
  (dict "name" "openarchiefbeheer" "pkce" .Values.openarchiefbeheer.configuration.pkceEnabled "data" .Values.openarchiefbeheer.configuration.data)
  (dict "name" "opennotificaties"  "pkce" .Values.opennotificaties.configuration.pkceEnabled  "data" .Values.opennotificaties.configuration.data)
  (dict "name" "objecten"          "pkce" .Values.objecten.configuration.pkceEnabled          "data" .Values.objecten.configuration.data)
  (dict "name" "objecttypen"       "pkce" .Values.objecttypen.configuration.pkceEnabled       "data" .Values.objecttypen.configuration.data)
  (dict "name" "openklant"         "pkce" .Values.openklant.configuration.pkceEnabled         "data" .Values.openklant.configuration.data)
  (dict "name" "openformulieren"   "pkce" .Values.openformulieren.configuration.pkceEnabled   "data" .Values.openformulieren.configuration.data)
  (dict "name" "openinwoner"       "pkce" .Values.openinwoner.configuration.pkceEnabled       "data" .Values.openinwoner.configuration.data)
-}}
{{- range $djangoApps }}
{{- if .pkce }}
{{- if and (ne .data "") (not (contains "oidc_use_pkce: true" .data)) }}
{{- fail (printf "%s: pkceEnabled is true but oidc_use_pkce: true is missing from configuration.data. Both must be enabled together — see keycloak-security-updates.md § PKCE Enforcement." .name) }}
{{- end }}
{{- end }}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-podiumd-realm-config
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-config-cli
data:
  podiumd.yaml: |
    realm: {{ .Values.keycloak.config.realm }}
    enabled: true
    displayName: {{ .Values.keycloak.config.realmDisplayName }}
    # This realm is exclusively for beheer (management) users and municipality staff.
    # Citizens are not authenticated here — they use centralized login methods (e.g. DigiD)
    # configured per application. Settings are therefore calibrated for privileged/internal users.
    loginWithEmailAllowed: true
    # rememberMe disabled: persistent sessions are not appropriate for privileged/admin users.
    # Recommended by BIO 2.0 §5.17, NCSC session management guidelines, and OWASP ASVS L2 §3.3.
    rememberMe: false
    registrationAllowed: false
    attributes:
      frontendUrl: {{ .Values.keycloak.config.realmFrontendUrl }}
      adminEventsExpiration: 2592000
    browserSecurityHeaders:
      xContentTypeOptions: "nosniff"
      xRobotsTag: "none"
      xFrameOptions: "SAMEORIGIN"
      contentSecurityPolicy: "frame-src 'self'; frame-ancestors 'self'; object-src 'none';"
      xXSSProtection: "1; mode=block"
      strictTransportSecurity: "max-age=31536000; includeSubDomains"
    bruteForceProtected: true
    failureFactor: 5
    revokeRefreshToken: true
    eventsEnabled: true
    adminEventsEnabled: true
    adminEventsDetailsEnabled: true
    eventsExpiration: 2592000
    offlineSessionMaxLifespanEnabled: true
    offlineSessionMaxLifespan: 7776000
    accessTokenLifespan: 60
    passwordPolicy: "length(12) and notUsername(undefined) and notEmail(undefined) and passwordHistory(5)"
    requiredActions:
      - name: "Configure OTP"
        providerId: CONFIGURE_TOTP
        enabled: "true"
        defaultAction: "true"
        alias: CONFIGURE_TOTP
    clients:
      - clientId: openzaak
        name: Open Zaak
        enabled: true
        clientAuthenticatorType: client-secret
{{- if .Values.openzaak.configuration.pkceEnabled }}
        pkceCodeChallengeMethod: S256
{{- end }}
        redirectUris:
          - "{{ .Values.openzaak.configuration.oidcUrl | trimSuffix "/" }}/*"
        webOrigins:
          - "{{ .Values.openzaak.configuration.oidcUrl | trimSuffix "/" }}/*"
        secret: $(KC_SECRET_OPENZAAK)
        protocolMappers:
          - name: "username"
            protocol: "openid-connect"
            protocolMapper: oidc-usermodel-property-mapper
            config:
              introspection.token.claim: "true"
              userinfo.token.claim: "true"
              user.attribute: "username"
              id.token.claim: "true"
              lightweight.claim: "false"
              access.token.claim: "true"
              claim.name: "preferred_username"
              jsonType.label: "String"
          - name: "client roles"
            protocol: "openid-connect"
            protocolMapper: "oidc-usermodel-client-role-mapper"
            consentRequired: false
            config:
              introspection.token.claim: "true"
              multivalued: "true"
              userinfo.token.claim: "false"
              user.attribute: "foo"
              id.token.claim: "true"
              lightweight.claim: "false"
              access.token.claim: "true"
              claim.name: "groups"
              jsonType.label: "String"
              usermodel.clientRoleMapping.clientId: "openzaak"
      - clientId: abc
        name: Open Archiefbeheer
        enabled: true
        clientAuthenticatorType: client-secret
{{- if .Values.openarchiefbeheer.configuration.pkceEnabled }}
        pkceCodeChallengeMethod: S256
{{- end }}
        redirectUris:
          - "{{ .Values.openarchiefbeheer.configuration.oidcUrl | trimSuffix "/" }}/*"
        webOrigins:
          - "{{ .Values.openarchiefbeheer.configuration.oidcUrl | trimSuffix "/" }}/*"
        secret: $(KC_SECRET_OPENARCHIEFBEHEER)
        protocolMappers:
          - name: "username"
            protocol: "openid-connect"
            protocolMapper: oidc-usermodel-property-mapper
            config:
              introspection.token.claim: "true"
              userinfo.token.claim: "true"
              user.attribute: "username"
              id.token.claim: "true"
              lightweight.claim: "false"
              access.token.claim: "true"
              claim.name: "preferred_username"
              jsonType.label: "String"
          - name: "client roles"
            protocol: "openid-connect"
            protocolMapper: "oidc-usermodel-client-role-mapper"
            consentRequired: false
            config:
              introspection.token.claim: "true"
              multivalued: "true"
              userinfo.token.claim: "false"
              user.attribute: "foo"
              id.token.claim: "true"
              lightweight.claim: "false"
              access.token.claim: "true"
              claim.name: "groups"
              jsonType.label: "String"
              usermodel.clientRoleMapping.clientId: "abc"
      - clientId: monitoring
        name: {{ .Values.keycloak.config.clients.monitoring.name|quote }}
        enabled: {{ .Values.keycloak.config.clients.monitoring.enabled }}
        secret: $(KC_SECRET_MONITORING)
        clientAuthenticatorType: client-secret
        redirectUris:
          - "{{ .Values.keycloak.config.clients.monitoring.oidcUrl | trimSuffix "/" }}/*"
        webOrigins:
          - "{{ .Values.keycloak.config.clients.monitoring.oidcUrl | trimSuffix "/" }}/*"
        authorizationServicesEnabled: "true"
        serviceAccountsEnabled: "true"
        protocolMappers:
          - name: "user-roles"
            protocol: "openid-connect"
            protocolMapper: "oidc-usermodel-client-role-mapper"
            consentRequired: false
            config:
              introspection.token.claim: "true"
              multivalued: "true"
              userinfo.token.claim: "true"
              id.token.claim: "true"
              lightweight.claim: "false"
              access.token.claim: "true"
              claim.name: "monitoring_roles"
              jsonType.label: "String"
              usermodel.clientRoleMapping.clientId: "monitoring"
          - name: "all-users-are-viewers"
            protocol: "openid-connect"
            protocolMapper: "oidc-hardcoded-role-mapper"
            consentRequired: false
            config:
              role: "monitoring.viewer"
