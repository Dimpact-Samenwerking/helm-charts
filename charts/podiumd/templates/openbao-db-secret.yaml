{{- /*
  Database Secret for OpenBao, rendered from .Values.openbao.database.*.

  Renders whenever openbao.enabled is true. Carries the libpq connection URL that
  the OpenBao server consumes as BAO_PG_CONNECTION_URL (see values:
  openbao.server.extraSecretEnvironmentVars) — passing the URL via a Secret env
  keeps the postgres credentials out of the server config ConfigMap. `username`
  and `password` are also exposed for ad-hoc psql access.

  The password is supplied by the deploy pipeline (ExternalsPodiumD application.yml
  substitutes REP_OPENBAO_DB_PASSWORD_REP from Azure Key Vault); never commit a
  real password here.
*/}}
{{- if .Values.openbao.enabled }}
{{- $db := .Values.openbao.database }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $db.secretName | quote }}
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: openbao
type: Opaque
stringData:
  username: {{ $db.username | quote }}
  password: {{ $db.password | quote }}
  connection-url: {{ printf "postgres://%s:%s@%s:%v/%s?sslmode=%s" ($db.username | urlquery) ($db.password | urlquery) $db.host $db.port $db.name $db.sslmode | quote }}
{{- end }}
