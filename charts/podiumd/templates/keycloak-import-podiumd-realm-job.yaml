{{- if (index .Values "keycloak-operator").enabled }}
---
# Job: import the podiumd realm config via keycloak-config-cli.
#
# Two-container design:
#   init container — authenticates to Keycloak via private_key_jwt (kc-admin-jwt secret),
#                    fetches the keycloak-operator client secret, writes it to a shared volume.
#   main container — runs keycloak-config-cli using client_credentials with the fetched secret.
#
# External dependencies (must exist before deploy):
#   Secret:    kc-admin-jwt          keys: admin-client-id, admin-client-key.pem
#   ConfigMap: podiumd-realm-config  key:  podiumd-realm-config.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: import-podiumd-realm-job
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 10
  template:
    metadata:
      labels:
        {{- include "podiumd.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak
    spec:
      {{- if .Values.keycloak.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.keycloak.nodeSelector | nindent 8 }}
      {{- else if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      volumes:
      - name: secret-vol
        secret:
          secretName: kc-admin-jwt
      - name: realm-configs
        configMap:
          name: podiumd-realm-config
          items:
          - key: podiumd-realm-config.yaml
            path: podiumd-realm-config.yaml
      - name: shared
        emptyDir: {}
      initContainers:
      - name: jwt-auth
        image: {{ (index .Values "keycloak-operator").realmImportJob.initImage.repository }}:{{ (index .Values "keycloak-operator").realmImportJob.initImage.tag }}
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -euo pipefail
          apk add --no-cache curl openssl >/dev/null 2>&1

          KC_URL="{{ coalesce .Values.keycloak.hostname.admin .Values.keycloak.config.adminFrontendUrl }}"
          TOKEN_EP="${KC_URL}/realms/master/protocol/openid-connect/token"
          CLIENT_ID=$(cat /secrets/admin-client-id)
          KEY_FILE="/secrets/admin-client-key.pem"

          b64url() { openssl base64 -e | tr -d '\n=' | tr '+/' '-_'; }

          HEADER=$(printf '{"alg":"RS256","typ":"JWT"}' | b64url)
          NOW=$(date +%s)
          EXP=$((NOW + 120))
          PAYLOAD=$(printf \
            '{"iss":"%s","sub":"%s","aud":"%s","iat":%d,"exp":%d,"jti":"kc-%d"}' \
            "$CLIENT_ID" "$CLIENT_ID" "$TOKEN_EP" "$NOW" "$EXP" "$NOW" | b64url)
          SIG=$(printf '%s' "${HEADER}.${PAYLOAD}" \
            | openssl dgst -sha256 -sign "$KEY_FILE" -binary | b64url)
          JWT="${HEADER}.${PAYLOAD}.${SIG}"

          echo "==> Requesting admin token via private_key_jwt..."
          RESP=$(curl -sf -X POST "$TOKEN_EP" \
            -d "grant_type=client_credentials" \
            -d "client_id=${CLIENT_ID}" \
            -d "client_assertion_type=urn%3Aietf%3Aparams%3Aoauth%3Aclient-assertion-type%3Ajwt-bearer" \
            --data-urlencode "client_assertion=${JWT}")
          ADMIN_TOKEN=$(echo "$RESP" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
          if [ -z "$ADMIN_TOKEN" ]; then
            echo "FATAL: JWT token exchange failed. Response: $RESP" >&2; exit 1
          fi
          echo "    Admin token obtained (len=${#ADMIN_TOKEN})"

          echo "==> Looking up keycloak-operator client..."
          OP_JSON=$(curl -sf \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            "${KC_URL}/admin/realms/master/clients?clientId=keycloak-operator")
          OP_ID=$(echo "$OP_JSON" | sed -n 's/.*"id":"\([^"]*\)".*/\1/p' | head -1)
          if [ -z "$OP_ID" ]; then
            echo "FATAL: keycloak-operator client not found" >&2; exit 2
          fi
          echo "    keycloak-operator internal id: $OP_ID"

          echo "==> Fetching keycloak-operator client secret..."
          SECRET_JSON=$(curl -sf \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            "${KC_URL}/admin/realms/master/clients/${OP_ID}/client-secret")
          OP_SECRET=$(echo "$SECRET_JSON" | sed -n 's/.*"value":"\([^"]*\)".*/\1/p')
          if [ -z "$OP_SECRET" ]; then
            echo "FATAL: Could not read keycloak-operator client secret" >&2; exit 3
          fi
          echo "    Client secret obtained"

          printf '%s' "$OP_SECRET" > /shared/client-secret
          echo "==> Init complete."
        volumeMounts:
        - name: secret-vol
          mountPath: /secrets
          readOnly: true
        - name: shared
          mountPath: /shared
      containers:
      - name: kc-config-cli
        image: {{ .Values.keycloak.keycloakConfigCli.image.repository }}:{{ .Values.keycloak.keycloakConfigCli.image.tag }}
        command: ["/bin/sh", "-c"]
        args:
        - |
          export KEYCLOAK_CLIENTSECRET=$(cat /shared/client-secret)
          java -jar /app/keycloak-config-cli.jar
        env:
        - name: KEYCLOAK_URL
          value: {{ coalesce .Values.keycloak.hostname.admin .Values.keycloak.config.adminFrontendUrl | quote }}
        - name: KEYCLOAK_CLIENTID
          value: "keycloak-operator"
        - name: KEYCLOAK_GRANTTYPE
          value: "client_credentials"
        - name: KEYCLOAK_REALM
          value: "master"
        - name: IMPORT_FILES_LOCATIONS
          value: "/config/podiumd-realm-config.yaml"
        - name: IMPORT_REMOTESTATE_ENABLED
          value: "true"
        - name: IMPORT_MANAGED_ROLE
          value: "no-delete"
        - name: IMPORT_MANAGED_GROUP
          value: "no-delete"
        - name: IMPORT_MANAGED_IDENTITY_PROVIDER
          value: "no-delete"
        - name: IMPORT_MANAGED_IDENTITY_PROVIDER_MAPPER
          value: "no-delete"
        volumeMounts:
        - name: realm-configs
          mountPath: /config
          readOnly: true
        - name: shared
          mountPath: /shared
          readOnly: true
{{- end }}
