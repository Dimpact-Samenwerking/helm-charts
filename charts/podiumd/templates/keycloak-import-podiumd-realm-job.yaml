{{- $operatorJobs := (index .Values "keycloak-operator").jobs }}
{{- $clientSecret := $operatorJobs.ensureOperatorSa.clientSecret }}
{{- if and (index .Values "keycloak-operator").enabled $operatorJobs.importPodiumdRealm.enabled $operatorJobs.ensureOperatorSa.enabled $clientSecret }}
---
# Job: import the podiumd realm config via keycloak-config-cli.
# Uses the keycloak-operator client secret (stored by ensure-keycloak-operator-sa job)
# to authenticate via client_credentials — no podiumd-admin or JWT key needed.
#
# External dependencies:
#   ConfigMap: keycloak-podiumd-realm-config  key: podiumd.yaml
#   Secret:    keycloak-operator-client-secret key: client-secret (written by ensure-keycloak-operator-sa)
apiVersion: batch/v1
kind: Job
metadata:
  name: import-podiumd-realm-job
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 10
  template:
    metadata:
      labels:
        {{- include "podiumd.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak
    spec:
      {{- if .Values.keycloak.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.keycloak.nodeSelector | nindent 8 }}
      {{- else if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      initContainers:
      - name: wait-for-operator-sa
        image: {{ include "podiumd.image" (index .Values "keycloak-operator").jobs.ensureOperatorSa.image }}
        resources:
{{ toYaml (index .Values "keycloak-operator").jobs.resources | indent 10 }}
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Waiting for keycloak-operator client credentials to work..."
          for i in $(seq 1 60); do
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "http://keycloak-service:8080/realms/master/protocol/openid-connect/token" \
              --data-urlencode "grant_type=client_credentials" \
              --data-urlencode "client_id=keycloak-operator" \
              --data-urlencode "client_secret=$CLIENT_SECRET")
            STATUS=$(printf '%s' "$RESPONSE" | tail -n1)
            if [ "$STATUS" = "200" ]; then echo "keycloak-operator SA authenticated."; exit 0; fi
            echo "Attempt $i/60 — status=$STATUS, body: $(printf '%s' "$RESPONSE" | head -n1)"
            sleep 10
          done
          echo "Timed out waiting for keycloak-operator SA"; exit 1
        env:
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: keycloak-operator-client-secret
              key: client-secret
        securityContext:
          runAsNonRoot: true
          runAsUser: 100
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
      volumes:
      - name: realm-configs
        configMap:
          name: keycloak-podiumd-realm-config
          items:
          - key: podiumd.yaml
            path: podiumd.yaml
      containers:
      - name: kc-config-cli
        image: {{ include "podiumd.image" .Values.keycloak.keycloakConfigCli.image }}
        resources:
{{ toYaml (index .Values "keycloak-operator").jobs.configCliResources | indent 10 }}
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: KEYCLOAK_URL
          value: {{ coalesce .Values.keycloak.hostname.admin .Values.keycloak.config.adminFrontendUrl "http://keycloak-service:8080" | quote }}
        - name: KEYCLOAK_CLIENTID
          value: "keycloak-operator"
        - name: KEYCLOAK_CLIENTSECRET
          valueFrom:
            secretKeyRef:
              name: keycloak-operator-client-secret
              key: client-secret
        - name: KEYCLOAK_GRANTTYPE
          value: "client_credentials"
        - name: KEYCLOAK_REALM
          value: "master"
        - name: IMPORT_FILES_LOCATIONS
          value: "/config/podiumd.yaml"
        - name: IMPORT_VAR_SUBSTITUTION_ENABLED
          value: "true"
        - name: IMPORT_REMOTESTATE_ENABLED
          value: "true"
        - name: IMPORT_MANAGED_ROLE
          value: "no-delete"
        - name: IMPORT_MANAGED_GROUP
          value: "no-delete"
        - name: IMPORT_MANAGED_IDENTITY_PROVIDER
          value: "no-delete"
        - name: IMPORT_MANAGED_IDENTITY_PROVIDER_MAPPER
          value: "no-delete"
        - name: KC_SECRET_OPENZAAK
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-realm-secrets
              key: openzaak-oidc-secret
        - name: KC_SECRET_OPENARCHIEFBEHEER
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-realm-secrets
              key: openarchiefbeheer-oidc-secret
        - name: KC_SECRET_MONITORING
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-realm-secrets
              key: monitoring-client-secret
        - name: KC_SECRET_OPENNOTIFICATIES
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-realm-secrets
              key: opennotificaties-oidc-secret
        - name: KC_SECRET_OBJECTEN
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-realm-secrets
              key: objecten-oidc-secret
        - name: KC_SECRET_OBJECTTYPEN
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-realm-secrets
              key: objecttypen-oidc-secret
        - name: KC_SECRET_OPENKLANT
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-realm-secrets
              key: openklant-oidc-secret
        - name: KC_SECRET_OPENFORMULIEREN
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-realm-secrets
              key: openformulieren-oidc-secret
        - name: KC_SECRET_OPENINWONER
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-realm-secrets
              key: openinwoner-oidc-secret
        - name: KC_SECRET_KISS
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-realm-secrets
              key: kiss-oidc-secret
        - name: KC_SECRET_ZAC
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-realm-secrets
              key: zac-auth-secret
        - name: KC_SECRET_ZAC_ADMIN
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-realm-secrets
              key: zac-keycloak-admin-secret
        - name: KC_SECRET_ITA
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-realm-secrets
              key: ita-oidc-secret
        - name: KC_SECRET_PABC
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-realm-secrets
              key: pabc-oidc-secret
        - name: KC_SECRET_PABC_ADMIN
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-realm-secrets
              key: pabc-keycloak-admin-secret
        volumeMounts:
        - name: realm-configs
          mountPath: /config
          readOnly: true
{{- end }}
