{{- if and (index .Values "keycloak-operator").enabled (index .Values "keycloak-operator").jobs.ensureOperatorSa.enabled }}
---
# Job: ensure the `keycloak-operator` service-account client exists in the Keycloak master realm
# and has the admin role assigned, so the Keycloak Operator can manage realms.
#
# Uses the podiumd-admin user (created by ensure-podiumd-admin-user job) to authenticate.
# Hook weight 10 — runs after ensure-podiumd-admin-user (weight 5).
apiVersion: batch/v1
kind: Job
metadata:
  name: ensure-keycloak-operator-sa
  labels:
    {{- include "podiumd.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 10
  template:
    metadata:
      labels:
        {{- include "podiumd.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak
    spec:
      {{- if .Values.keycloak.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.keycloak.nodeSelector | nindent 8 }}
      {{- else if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      initContainers:
      - name: wait-for-podiumd-admin
        image: {{ include "podiumd.image" (index .Values "keycloak-operator").jobs.ensureOperatorSa.image }}
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Waiting for podiumd-admin to be able to authenticate..."
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "http://keycloak-service:8080/realms/master/protocol/openid-connect/token" \
              -d "grant_type=password&client_id=admin-cli&username=podiumd-admin&password=$ADMIN_PASS")
            if [ "$STATUS" = "200" ]; then echo "podiumd-admin authenticated."; exit 0; fi
            echo "Attempt $i/60 — status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Timed out waiting for podiumd-admin"; exit 1
        env:
        - name: ADMIN_PASS
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-admin
              key: password
      containers:
      - name: ensure-operator-sa
        image: {{ include "podiumd.image" (index .Values "keycloak-operator").jobs.ensureOperatorSa.image }}
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -euo pipefail
          SERVER="http://keycloak-service:8080"
          ADMIN_USER="podiumd-admin"
          : "${ADMIN_PASS:?}"

          echo "Obtaining admin token via ROPC..."
          ADMIN_TOKEN=$(curl -s -X POST "$SERVER/realms/master/protocol/openid-connect/token" \
            -d "grant_type=password&client_id=admin-cli&username=$ADMIN_USER&password=$ADMIN_PASS" \
            | sed -n 's/.*"access_token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
          if [ -z "$ADMIN_TOKEN" ]; then echo "Failed to obtain admin token"; exit 2; fi

          echo "Ensuring client keycloak-operator exists..."
          CLIENT_INFO=$(curl -s -H "Authorization: Bearer $ADMIN_TOKEN" \
            "$SERVER/admin/realms/master/clients?clientId=keycloak-operator")
          CLIENT_ID=$(echo "$CLIENT_INFO" | sed -n 's/.*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1 || true)
          if [ -z "$CLIENT_ID" ]; then
            echo "Creating client keycloak-operator..."
            curl -s -X POST -H "Authorization: Bearer $ADMIN_TOKEN" -H "Content-Type: application/json" \
              -d '{"clientId":"keycloak-operator","serviceAccountsEnabled":true,"publicClient":false,"directAccessGrantsEnabled":true,"protocol":"openid-connect"}' \
              "$SERVER/admin/realms/master/clients"
            sleep 1
            CLIENT_INFO=$(curl -s -H "Authorization: Bearer $ADMIN_TOKEN" \
              "$SERVER/admin/realms/master/clients?clientId=keycloak-operator")
            CLIENT_ID=$(echo "$CLIENT_INFO" | sed -n 's/.*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1 || true)
            echo "Created client id: $CLIENT_ID"
          else
            echo "Client exists: $CLIENT_ID"
          fi

          echo "Ensuring directAccessGrantsEnabled=true..."
          curl -s -X PUT -H "Authorization: Bearer $ADMIN_TOKEN" -H "Content-Type: application/json" \
            -d '{"clientId":"keycloak-operator","serviceAccountsEnabled":true,"publicClient":false,"directAccessGrantsEnabled":true,"protocol":"openid-connect"}' \
            "$SERVER/admin/realms/master/clients/$CLIENT_ID" || true

          echo "Fetching service account user id..."
          SA_JSON=$(curl -s -H "Authorization: Bearer $ADMIN_TOKEN" \
            "$SERVER/admin/realms/master/clients/$CLIENT_ID/service-account-user")
          SA_USER_ID=$(echo "$SA_JSON" | sed -n 's/.*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1 || true)
          if [ -z "$SA_USER_ID" ]; then echo "Failed to get service account user id"; exit 3; fi
          echo "Service account user id: $SA_USER_ID"

          echo "Assigning realm role 'admin' to service account..."
          ROLE_JSON=$(curl -s -H "Authorization: Bearer $ADMIN_TOKEN" "$SERVER/admin/realms/master/roles/admin")
          curl -s -X POST -H "Authorization: Bearer $ADMIN_TOKEN" -H "Content-Type: application/json" \
            -d "[$ROLE_JSON]" "$SERVER/admin/realms/master/users/$SA_USER_ID/role-mappings/realm" || true

          echo "Setting client secret to known value..."
          curl -s -X PUT -H "Authorization: Bearer $ADMIN_TOKEN" -H "Content-Type: application/json" \
            -d "{\"clientId\":\"keycloak-operator\",\"secret\":\"$CLIENT_SECRET\",\"serviceAccountsEnabled\":true,\"publicClient\":false,\"directAccessGrantsEnabled\":true,\"protocol\":\"openid-connect\"}" \
            "$SERVER/admin/realms/master/clients/$CLIENT_ID" || true

          echo "Verifying client_credentials token..."
          TOKEN_RESPONSE=$(curl -s -X POST "$SERVER/realms/master/protocol/openid-connect/token" \
            -d "grant_type=client_credentials&client_id=keycloak-operator&client_secret=$CLIENT_SECRET")
          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | sed -n 's/.*"access_token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1 || true)
          if [ -z "$ACCESS_TOKEN" ]; then echo "Failed to obtain client token: $TOKEN_RESPONSE"; exit 4; fi

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" "$SERVER/admin/realms")
          if [ "$HTTP_STATUS" -ne 200 ]; then echo "Client token cannot list realms, status=$HTTP_STATUS"; exit 5; fi

          echo "Disabling podiumd-admin user now that keycloak-operator SA is operational..."
          ADMIN_USER_JSON=$(curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
            "$SERVER/admin/realms/master/users?username=podiumd-admin&exact=true")
          ADMIN_USER_ID=$(echo "$ADMIN_USER_JSON" | sed -n 's/.*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1 || true)
          if [ -z "$ADMIN_USER_ID" ]; then
            echo "Warning: could not find podiumd-admin user id, skipping disable"
          else
            curl -s -X PUT -H "Authorization: Bearer $ACCESS_TOKEN" -H "Content-Type: application/json" \
              -d '{"enabled":false}' \
              "$SERVER/admin/realms/master/users/$ADMIN_USER_ID"
            echo "podiumd-admin user disabled."
          fi

          echo "Done: keycloak-operator client is present, service account has admin role, client_credentials work."
        env:
        - name: ADMIN_PASS
          valueFrom:
            secretKeyRef:
              name: keycloak-podiumd-admin
              key: password
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: keycloak-operator-client-secret
              key: client-secret
{{- end }}
