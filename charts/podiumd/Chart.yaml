apiVersion: v2
name: podiumd
description: PodiumD Helm chart
type: application
version: 4.6.5
appVersion: "4.6.5"
dependencies:
  - name: keycloak-operator
    version: 1.11.2
    repository: "@adfinis"
    condition: keycloak-operator.enabled
  - name: clamav
    version: 3.7.1
    repository: "@wiremind"
    condition: clamav.enabled
  - name: brp-personen-mock
    version: 1.2.8
    repository: "@dimpact"
    condition: brppersonenmock.enabled
    alias: brppersonenmock
  - name: openzaak
    version: 1.13.1
    repository: "@maykinmedia"
    condition: openzaak.enabled
  - name: opennotificaties
    version: 1.13.1
    repository: "@maykinmedia"
    condition: opennotificaties.enabled
  - name: objecten
    version: 2.12.0
    repository: "@maykinmedia"
    condition: objecten.enabled
  - name: objecttypen
    version: 1.6.1
    repository: "@maykinmedia"
    condition: objecttypen.enabled
  - name: openarchiefbeheer
    version: 1.5.3
    repository: "@maykinmedia"
    condition: openarchiefbeheer.enabled
  - name: openklant
    version: 1.11.0
    repository: "@maykinmedia"
    condition: openklant.enabled
  - name: openforms
    alias: openformulieren
    version: 1.12.0
    repository: "@maykinmedia"
    condition: openformulieren.enabled
  - name: openinwoner
    version: 2.1.3
    repository: "@maykinmedia"
    condition: openinwoner.enabled
  - name: referentielijsten
    alias: referentielijsten
    repository: "@maykinmedia"
    version: 0.1.1
    condition: referentielijsten.enabled
  - name: openbeheer
    version: 0.1.2
    repository: "@maykinmedia"
    condition: openbeheer.enabled
  - name: kiss-elastic
    alias: kisselastic
    version: 1.1.0
    repository: "@kiss-elastic"
    condition: kisselastic.enabled
    tags:
      - contact
  - name: zaakafhandelcomponent
    alias: zac
    version: 1.0.224 # ZAC 4.7 helm release
    repository: "@zac"
    condition: zac.enabled
    tags:
      - zaak
  - name: zgw-office-addin
    repository: "@zgw-office-addin"
    version: 0.0.83
    condition: zgw-office-addin.enabled
  - name: internetaakafhandeling
    alias: ita
    repository: "oci://ghcr.io/interne-taak-afhandeling"
    version: 3.0.0
    condition: ita.enabled
  - name: kiss-chart
    alias: kiss
    repository: "oci://ghcr.io/klantinteractie-servicesysteem"
    version: 2.2.2
    condition: kiss.enabled
  - name: pabc
    alias: pabc
    repository: "oci://ghcr.io/platform-autorisatie-beheer-component"
    version: 1.1.0
    condition: pabc.enabled
  - name: notifynl-omc-nodep
    alias: omc
    repository: "@worth-nl"
    version: 0.14.0
    condition: omc.enabled
  - name: redis-operator
    repository: "@opstree"
    version: 0.24.0
    condition: redis-operator.enabled
