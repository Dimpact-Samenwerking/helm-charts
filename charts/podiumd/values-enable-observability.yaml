# ---------------------------------------------------------------------------
# ZAC — Java OTEL agent flags + solr/zookeeper operator scrape annotations
# opentelemetry-collector sidecar is disabled; we use the shared collector
# ---------------------------------------------------------------------------

zac:
  opentelemetry_zaakafhandelcomponent:
    disabled: ""
    endpoint: *otelEndpoint
  # javaOptions extends the chart default (-Xmx1024m -Xms1024m -Xlog:gc::time,uptime)
  # with OTEL agent configuration
  javaOptions: >-
    -Xmx1024m -Xms1024m -Xlog:gc::time,uptime
    -Dotel.service.name=zac
    -Dotel.exporter.otlp.endpoint=http://monitoring-opentelemetry-collector.monitoring.svc.cluster.local:4317
    -Dotel.exporter.otlp.protocol=grpc
    -Dotel.traces.exporter=otlp
    -Dotel.metrics.exporter=otlp
    -Dotel.logs.exporter=none
  # Solr Operator — hardcodes prometheus.io/scrape: "true" in its deployment template already.
  # Only port and path need to be added via annotations (port 8080).
  solr-operator:
    annotations:
      prometheus.io/port: "8080"
      prometheus.io/path: /metrics
    # Zookeeper Operator — port 6000
    zookeeper-operator:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "6000"
        prometheus.io/path: /metrics

# ---------------------------------------------------------------------------
# Keycloak — the keycloak-operator automatically creates a ServiceMonitor when
# the Prometheus Operator CRDs are installed. No extra configuration is needed
# here. Metrics endpoint is port 9000 (/metrics), enabled via additionalOptions
# in values.yaml (metrics-enabled: true).
# ---------------------------------------------------------------------------

keycloak-operator:
  enableServiceMonitor: true

# ---------------------------------------------------------------------------
# Redis operator — scrape the operator deployment (port 8080) and enable the
# redis_exporter sidecar on each redis-ha pod (port 9121) with a PodMonitor.
# Note: the redis-operator itself uses annotation-based scraping (no ServiceMonitor
# supported by the operator chart). Requires additionalScrapeConfigs in the
# monitoring chart for the annotations to be picked up by kube-prometheus-stack.
# The redis-ha PodMonitor requires the Prometheus Operator CRDs.
# ---------------------------------------------------------------------------

redis-operator:
  redisOperator:
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: /metrics
  redis-ha:
    redisExporter:
      enabled: true
      podMonitor:
        enabled: true

# ---------------------------------------------------------------------------
# ClamAV — sergeymakinen/clamav_exporter sidecar + ServiceMonitor (port 9906)
# Note: the upstream clamav chart (v3.2.0) does NOT include a metrics exporter
# sidecar or a ServiceMonitor template. The settings below are placeholders for
# a future chart version that adds this support. They have no effect currently.
# ---------------------------------------------------------------------------

clamav:
  metrics:
    enabled: false
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s

# ---------------------------------------------------------------------------
# ECK operator (via kiss-elastic) — enable metrics port and create a PodMonitor
# for the ECK operator pod itself. The eck-operator-podmonitor-rbac template in
# the podiumd chart grants the elastic-operator SA permission to also create
# PodMonitors for managed Elasticsearch/Kibana instances at runtime.
# Requires: kisselastic.enabled: true and Prometheus Operator CRDs installed.
# ---------------------------------------------------------------------------

kisselastic:
  eck-operator:
    config:
      metricsPort: "8080"
    podMonitor:
      enabled: true
      interval: 1m
      scrapeTimeout: 30s
