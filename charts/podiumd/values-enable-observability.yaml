# Enable observability (OpenTelemetry + Prometheus) for all supported components.
#
# Usage: helm upgrade podiumd charts/podiumd -f values.yaml -f values-enable-observability.yaml -n podiumd
#
# Collector endpoint: the OpenTelemetry Collector deployed by the monitoring-logging chart
# in the monitoring namespace, accepting OTLP over gRPC on port 4317.
# Adjust the endpoint if your collector runs elsewhere.

_otelEndpoint: &otelEndpoint "http://monitoring-opentelemetry-collector.monitoring.svc.cluster.local:4317"

# ---------------------------------------------------------------------------
# Maykin apps — Django-based, all share the same settings.otel schema
# ---------------------------------------------------------------------------

openzaak:
  settings:
    otel:
      disabled: false
      exporterOtlpEndpoint: *otelEndpoint
      exporterOtlpProtocol: grpc
      exporterOtlpMetricsInsecure: true
      metricExportInterval: 60000
      metricExportTimeout: 10000

