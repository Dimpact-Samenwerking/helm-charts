# ---------------------------------------------------------------------------
# ZAC — Java OTEL agent flags + solr/zookeeper operator scrape annotations
# opentelemetry-collector sidecar is disabled; we use the shared collector
# ---------------------------------------------------------------------------

zac:
  opentelemetry_zaakafhandelcomponent:
    disabled: ""
    endpoint: *otelEndpoint
  # javaOptions extends the chart default (-Xmx1024m -Xms1024m -Xlog:gc::time,uptime)
  # with OTEL agent configuration
  javaOptions: >-
    -Xmx1024m -Xms1024m -Xlog:gc::time,uptime
    -Dotel.service.name=zac
    -Dotel.exporter.otlp.endpoint=http://monitoring-opentelemetry-collector.monitoring.svc.cluster.local:4317
    -Dotel.exporter.otlp.protocol=grpc
    -Dotel.traces.exporter=otlp
    -Dotel.metrics.exporter=otlp
    -Dotel.logs.exporter=none
  # Solr Operator — hardcodes prometheus.io/scrape: "true" in its deployment template already.
  # Only port and path need to be added via annotations (port 8080).
  solr-operator:
    annotations:
      prometheus.io/port: "8080"
      prometheus.io/path: /metrics
    # Zookeeper Operator — port 6000
    zookeeper-operator:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "6000"
        prometheus.io/path: /metrics

# ---------------------------------------------------------------------------
# Keycloak — metrics enabled via additionalOptions in values.yaml (metrics-enabled: true).
# Prometheus scrape annotations on the pod template so Prometheus can discover the endpoint.
# ---------------------------------------------------------------------------

keycloak:
  podTemplate:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
        prometheus.io/path: /metrics

# ---------------------------------------------------------------------------
# Redis operator — scrape the operator deployment (port 8080) and enable the
# redis_exporter sidecar on each redis-ha pod (port 9121).
# ---------------------------------------------------------------------------

redis-operator:
  redisOperator:
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: /metrics
  redis-ha:
    redisExporter:
      enabled: true

# ---------------------------------------------------------------------------
# ClamAV — sergeymakinen/clamav_exporter sidecar + ServiceMonitor (port 9906)
# ServiceMonitor requires the Prometheus Operator CRD (monitoring.coreos.com/v1).
# Set serviceMonitor.enabled: true if the CRD is installed in your cluster.
# ---------------------------------------------------------------------------

clamav:
  metrics:
    enabled: true
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s

# ---------------------------------------------------------------------------
# ECK operator (via kiss-elastic) — enable metrics port and create a PodMonitor
# PodMonitor requires the Prometheus Operator CRD (monitoring.coreos.com/v1).
# Set podMonitor.enabled: true if the CRD is installed in your cluster.
# ---------------------------------------------------------------------------

kisselastic:
  eck-operator:
    config:
      metricsPort: "8080"
    podMonitor:
      enabled: false
      interval: 1m
      scrapeTimeout: 30s
