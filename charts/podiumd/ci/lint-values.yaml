# Dummy values for `helm lint`. All fields satisfy minLength/minItems constraints
# from the kiss subchart schema without providing real secrets or URLs.
#
# Also sets allowInsecureImages for rabbitmq: the opennotificaties chart bundles
# rabbitmq-16.0.12 whose Chart.yaml annotation still lists docker.io/bitnami/rabbitmq,
# but its own values.yaml defaults to bitnamilegacy/rabbitmq. This mismatch triggers a
# fail in the Bitnami image-check template; allowInsecureImages bypasses it for linting.

zac:
  auth:
    secret: "placeholder"

keycloak:
  auth:
    adminPassword: "placeholder"
  config:
    clients:
      monitoring:
        secret: "placeholder"

keycloak-operator:
  jobs:
    ensureOperatorSa:
      clientSecret: "placeholder"

# Keycloak realm OIDC client secrets — required by the realm import job for every component.
openzaak:
  configuration:
    secrets:
      keycloak_client_secret: "placeholder"

# Prevents nil pointer in objecten/templates/secret.yaml; also provides realm secret.
objecten:
  configuration:
    demo:
      enabled: false
    secrets:
      keycloak_client_secret: "placeholder"

# allowInsecureImages bypasses the Bitnami image-check template for rabbitmq.
opennotificaties:
  configuration:
    secrets:
      keycloak_client_secret: "placeholder"
  rabbitmq:
    global:
      security:
        allowInsecureImages: true

