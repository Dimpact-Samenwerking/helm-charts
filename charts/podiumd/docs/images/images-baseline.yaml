# Baseline images — long-stable images that the per-release images-*.yaml deltas
# never captured (they only list images NEW or CHANGED in a given release, so an
# image that has not moved since before 4.5.16 — where tracking starts — is
# absent from every delta and therefore from the aggregated mirror manifest).
#
# This file fills those gaps so scripts/mirror-strip-registry.py --gen-manifest
# (which aggregates every images-*.yaml) emits a complete mirror list.
#
# name = strip_registry(url): upstream url with the registry host removed, full
# <namespace>/<repo> path kept. Versions are the tags pinned in
# charts/podiumd/values.yaml (or the owning subchart). Digests resolved live
# against the source registry (Docker-Content-Digest / manifest_digest).
#
# When one of these images is bumped in a future release, move its (updated)
# entry into that release's images-<version>.yaml and drop it here.

# Objects API (objecten) — chart pins maykinmedia/objects-api (English upstream;
# the ACR repo is objects-api, NOT the Dutch "objecten-api").
- name: maykinmedia/objects-api
  url: docker.io/maykinmedia/objects-api
  version: "3.6.0"
  digest: "sha256:8b4ac4dd97c32b1bc250faf88ebae6229eccad6787dc9bd2932edbc0336265e2"

