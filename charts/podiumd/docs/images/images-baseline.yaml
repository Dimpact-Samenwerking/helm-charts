# Baseline images — the single, complete strip-registry mirror manifest.
#
# This is the authoritative list of every image PodiumD pulls, under the
# strip-registry mirror convention:
#   name = strip_registry(url): upstream url with the registry host removed,
#   full <namespace>/<repo> path kept.
# Versions are the tags pinned in charts/podiumd/values.yaml (or the owning
# subchart). Digests are resolved live against the source registry
# (Docker-Content-Digest / manifest_digest).
#
# It supersedes the previously split files:
#   * the per-release images-<version>.yaml deltas (NEW/CHANGED images per
#     release — kept as historical record), and
#   * the formerly generated images-mirror-stripped.yaml aggregate (removed).
#
# Note: scripts/mirror-strip-registry.py --gen-manifest aggregates only the
# per-release deltas; the long-stable gap-filler entries below (images that have
# not moved since before 4.5.16, where delta tracking starts) are NOT reproduced
# by that command and must be maintained here by hand.

