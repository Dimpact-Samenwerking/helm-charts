# Images new or changed in podiumd 4.7.2 vs 4.7.1.
#
# This release contains three tag bumps:
#   * keycloak / keycloak-operator 26.6.1 → 26.6.2 — Keycloak security
#     release; fixes a dozen CVEs incl. account-takeover-class issues
#     (redirect-URI bypass, OIDC session fixation, access-token disclosure
#     via forged client, WebAuthn replay, HTTP request smuggling, HTTP/2
#     CONTINUATION DoS, stored XSS, multiple UMA/access-control flaws,
#     Bouncy Castle). See the per-entry comment block below for the full
#     CVE list and https://www.keycloak.org/2026/05/keycloak-2662-released.
#   * nginx-unprivileged 1.30.0 → 1.30.2 — latest patch on the 1.30.x
#     line; picks up CVE-2026-42945 ("nginx Rift" RCE, critical, fixed
#     in 1.30.1) and CVE-2026-9256 (rewrite-module buffer overflow,
#     medium, fixed in 1.30.2).
#   * open-inwoner 2.1.2-rc1 → 2.1.2 — promotion from release candidate
#     to the stable upstream release (commit ad5b2eb, "Set OIP image tag
#     to 2.1.2"), unblocking the 4.7 promotion path.
# All other entries below are upstream digest refreshes only — the same
# tag was republished by the upstream with newer base/security layers,
# so the multi-arch index digest changed while the version stayed put.
# The ACR mirror must mirror these new digests and the new 1.30.2 /
# 2.1.2 / 26.6.2 tags. Digest pins in charts/podiumd/values.yaml are
# otherwise maintained by Renovate (PRs #310/#311/#312 and similar).

# nginx-unprivileged (ZAC nginx + apiproxy + openzaak/openformulieren/
