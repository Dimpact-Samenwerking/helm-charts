# Images new or changed in podiumd 4.7.2 vs 4.7.1.
#
# This release contains two tag bumps:
#   * nginx-unprivileged 1.30.0 → 1.30.2 — latest patch on the 1.30.x
#     line; picks up CVE-relevant base/security layer fixes published
#     upstream after 4.7.1 was cut.
#   * open-inwoner 2.1.2-rc1 → 2.1.2 — promotion from release candidate
#     to the stable upstream release (commit ad5b2eb, "Set OIP image tag
#     to 2.1.2"), unblocking the 4.7 promotion path.
# All other entries below are upstream digest refreshes only — the same
# tag was republished by the upstream with newer base/security layers,
# so the multi-arch index digest changed while the version stayed put.
# The ACR mirror must mirror these new digests (and the new 1.30.2 and
# 2.1.2 tags). Digest pins in charts/podiumd/values.yaml are otherwise
# maintained by Renovate (PRs #310/#311/#312 and similar).

