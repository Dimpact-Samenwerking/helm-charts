# Images die nieuw of gewijzigd zijn in podiumd 4.7.2 t.o.v. 4.7.1.
#
# Deze release wijzigt geen image-versies (tags) t.o.v. 4.7.1. Het betreft
# uitsluitend upstream digest-refreshes: dezelfde tag is door de upstream
# opnieuw gepubliceerd met nieuwere base-/security-layers, waardoor de
# multi-arch index-digest is gewijzigd. De ACR-mirror moet deze nieuwe
# digests spiegelen. De digest-pins in charts/podiumd/values.yaml worden
# los hiervan door Renovate bijgewerkt (PR's #310/#311/#312 e.a.).

