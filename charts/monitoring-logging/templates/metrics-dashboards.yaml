apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.grafana.dashboardsConfigMaps.metrics }}
  labels:
    grafana_dashboard: "1"
data:
  node-exporter-full.json: |-
{{ .Files.Get "dashboards/metrics/node-exporter-full.json" | indent 4 }}
  kubernetes-cluster-monitoring.json: |-
{{ .Files.Get "dashboards/metrics/kubernetes-cluster-monitoring.json" | indent 4 }}
  kubernetes-deployments.json: |-
{{ .Files.Get "dashboards/metrics/kubernetes-deployments.json" | indent 4 }}
  traefik.json: |-
{{ .Files.Get "dashboards/metrics/traefik.json" | indent 4 }}
  keycloak.json: |-
{{ .Files.Get "dashboards/metrics/keycloak.json" | indent 4 }}
  otel-collector.json: |-
{{ .Files.Get "dashboards/metrics/otel-collector.json" | indent 4 }}
