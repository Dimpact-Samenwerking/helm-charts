  indexGateway:
    replicas: 2
    maxUnavailable: 1
    nodeSelector:
      agentpool: userpool
  queryScheduler:
    replicas: 2
    nodeSelector:
      agentpool: userpool
  queryFrontend:
    replicas: 2
    maxUnavailable: 1
    nodeSelector:
      agentpool: userpool
  distributor:
    replicas: 3
    maxUnavailable: 2
    nodeSelector:
      agentpool: userpool
  querier:
    replicas: 3
    maxUnavailable: 2
    nodeSelector:
      agentpool: userpool
  gateway:
    nodeSelector:
      agentpool: userpool
    # nginx-unprivileged image settings
    image:
      pullPolicy: IfNotPresent
      tag: alpine3.22-perl
  ingester:
    replicas: 3
    nodeSelector:
      agentpool: userpool
    zoneAwareReplication:
      zoneA:
        nodeSelector:
          agentpool: userpool
      zoneB:
        nodeSelector:
          agentpool: userpool
      zoneC:
        nodeSelector:
          agentpool: userpool

  # kubectl image settings
  kubectlImage:
    tag: 1.33.3-debian-12-r1
    pullPolicy: IfNotPresent
  test:
    enabled: false
    # loki-helm-test image settings
    # image is not used

    #  image:
    #    pullPolicy: IfNotPresent
    #     tag: ewelch-distributed-helm-chart-17db5ee
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  compactor:
    replicas: 1
    nodeSelector:
      agentpool: userpool
  loki:
    auth_enabled: false
    schemaConfig:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    tracing:
      enabled: true
      
    storage:
      s3:
        endpoint: http://{{ .Release.Name }}-minio-svc:9000
        insecure: true
        s3forcepathstyle: true
      object_store:
        type: s3
        s3: 
          endpoint: http://{{ .Release.Name }}-minio-svc:9000
          insecure: true
        
    compactor:
      delete_request_store: s3
      compaction_interval: 10m
      retention_delete_delay: 2h
      retention_delete_worker_count: 150
      retention_enabled: true
      
      # -- Query Performance
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
      retention_period: 30d # 1 month retention
      max_query_lookback: 30d # 1 month query lookback
      ingestion_rate_strategy: local # Default: global
      max_global_streams_per_user: 5000
      max_query_length: 721h # 1 month. Default: 721h
      max_query_parallelism: 48 # Utilize Azure's high throughput
      max_streams_per_user: 0 # Old Default: 10000
      split_queries_by_interval: 15m # Smaller splits = faster parallelization
      max_cache_freshness_per_query: 10m
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
      
    query_scheduler:
      # the TSDB index dispatches many more, but each individually smaller, requests.
      # We increase the pending request queue sizes to compensate.
      max_outstanding_requests_per_tenant: 32768
      
    ingester:
      chunk_encoding: snappy
      chunk_idle_period: 30m # Flush chunks faster = less memory
      chunk_block_size: 262144
      chunk_retain_period: 1m
      
    pattern_ingester:
      enabled: true
      
    querier:
      max_concurrent: 6 # Per-pod parallelism
      
    frontend:
      max_outstanding_per_tenant: 6144

    # loki image settings
    image:
      pullPolicy: IfNotPresent
      tag: 3.6.7
    

  minio:
