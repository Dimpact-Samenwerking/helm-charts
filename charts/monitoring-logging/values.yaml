grafana:
  enabled: true
  assertNoLeakedSecrets: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # Recreate strategy avoids RWO PVC deadlock during rolling updates —
  # with RollingUpdate (default), the new pod cannot attach the PVC until
  # the old pod releases it, but the old pod won't terminate until the new
  # pod is Ready: a deadlock. Recreate terminates the old pod first.
  deploymentStrategy:
    type: Recreate

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          editable: true
          type: prometheus
          uid: prometheus
          readOnly: false
          url: http://{{ .Release.Name }}-kube-prometheus-prometheus:9090
          access: proxy
          isDefault: false
        - name: loki
          type: loki
          uid: loki
          readOnly: false
          editable: true
          access: proxy
          isDefault: true
          url: http://{{ .Release.Name }}-loki-gateway
          version: 1
          jsonData:
            timeout: 300
            httpHeaderName1: "X-Scope-OrgID"
          secureJsonData:
            httpHeaderValue1: "1"
        # -- Tempo datasource: requires tempo.enabled=true
        - name: Tempo
          type: tempo
          uid: tempo
          readOnly: false
          editable: true
          access: proxy
          isDefault: false
          url: http://{{ .Release.Name }}-tempo:3200
          jsonData:
            tracesToLogsV2:
              datasourceUid: loki
              filterByTraceID: true
              filterBySpanID: false
            tracesToMetrics:
              datasourceUid: prometheus
            serviceMap:
              datasourceUid: prometheus
            nodeGraph:
              enabled: true
  # -- curl image settings
  # docker.io/curlimages/curl:8.16.0
  downloadDashboardsImage:
    pullPolicy: IfNotPresent
    sha: ""
    tag: 8.16.0     

  containerSecurityContext:
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    
 # -- Dashboard providers
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "default"
          orgId: 1
          folder: 'PodiumD_Monitoring_Logging'
          type: file
          disableDeletion: false
          updateIntervalSeconds: 30
          allowUiUpdates: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
        - name: "logs"
          orgId: 1
          folder: 'PodiumD_Monitoring_Logging'
          type: file
          disableDeletion: false
          updateIntervalSeconds: 30
          allowUiUpdates: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/logs
        - name: "metrics"
          orgId: 1
          folder: 'PodiumD_Metrics'
          type: file
          disableDeletion: false
          updateIntervalSeconds: 30
          allowUiUpdates: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/metrics
        - name: "metrics-node"
          orgId: 1
          folder: 'PodiumD_Metrics'
          type: file
          disableDeletion: false
          updateIntervalSeconds: 30
          allowUiUpdates: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/metrics-node

  # -- Dashboard opgenomen in ConfigMap
  dashboardsConfigMaps:
    default: "logging-main-dashboard"
    logs: "logging-logs"
    metrics: "monitoring-metrics-dashboards"
    metrics-node: "monitoring-metrics-dashboards-node"
  
  grafana.ini:
    # -- Authentication and Authorization with Keycloak
    auth.generic_oauth:
      enabled: true
      name: Keycloak-podiumd
      allow_sign_up: true
      allow_assign_grafana_admin: true
      client_id: "monitoring"
      client_secret: ""
      scopes: openid email profile offline_access roles
      email_attribute_path: email
      login_attribute_path: username
      name_attribute_path: name
      auth_url: "https://keycloak.test.nl/realms/podiumd/protocol/openid-connect/auth"
      token_url: "https://keycloak.test.nl/realms/podiumd/protocol/openid-connect/token"
      api_url: "https://keycloak.test.nl/realms/podiumd/protocol/openid-connect/userinfo"
      role_attribute_path: "contains(monitoring_roles[*], 'admin') && 'Admin' || contains(monitoring_roles[*], 'editor') && 'Editor' || 'Viewer'"
      role_attribute_strict: false
      org_mapping: "*:Viewer"
      skip_org_role_sync: false
      groups_attribute_path: groups
      use_refresh_token: true
      sync_ttl: 60
      use_pkce: true
    auth:
      oauth_skip_org_role_update_sync: false
      oauth_auto_login: true
      disable_login_form: true
      disable_signout_menu: false
      allow_sign_up: true
    server:
      domain: "logs.test.nl"
      enforce_domain: true
      root_url: "https://logs.test.nl/"
    metrics:
      enabled: false  
    security:
      cookie_secure: true
      cookie_samesite: lax
      content_security_policy: true
      content_security_policy_template: "script-src 'self' 'unsafe-eval' 'unsafe-inline' 'strict-dynamic' $NONCE;object-src 'none';font-src 'self';style-src 'self' 'unsafe-inline' blob:;img-src * data:;base-uri 'self';connect-src 'self' grafana.com ws://$ROOT_PATH wss://$ROOT_PATH;manifest-src 'self';media-src 'none';form-action 'self';"
      hide_version: true
    auth.anonymous:
      enabled: false     # Ensure anonymous access is disabled
      hide_version: true # Add this to explicitly hide version for anonymous users
      
    # -- Grafana Advisor surfaces recommendations in the Grafana UI
    feature_toggles:
      grafanaAdvisor: true
  # -- Grafana image settings
  # docker.io/grafana/grafana:12.3.0-17814087142-ubuntu
  image:
    pullPolicy: IfNotPresent
    tag: 12.3.0-17814087142-ubuntu

  initChownData:
    # -- Busybox image settings
    # docker.io/library/busybox:1.37.0-uclibc
    image:
      pullPolicy: IfNotPresent
      tag: 1.37.0-uclibc

  imageRenderer:
    # -- Grafana image renderer settings
    # docker.io/grafana/grafana-image-renderer:v4.0.14
    image:
      pullPolicy: Always
      tag: v4.0.14
  testFramework:
    # -- bats image settings
    # docker.io/bats/bats:1.12.0
    image:
      tag: 1.12.0
    imagePullPolicy: IfNotPresent
  persistence:
    enabled: true
    storageClassName: "managed-csi" # Specify your storage class
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    type: pvc
    finalizers:
      - kubernetes.io/pvc-protection

  sidecar:
    datasources:
      enabled: true
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"

kube-prometheus-stack:
  enabled: true
  # CRDs are managed separately — install before deploying this chart:
  # ./scripts/install-prometheus-operator-crds.sh --context <cluster>
  crds:
    enabled: false
  # Grafana is already deployed as a standalone dependency above
  grafana:
    enabled: false
  # Alertmanager disabled — no alert routing configured
  alertmanager:
    enabled: false
  prometheus:
    prometheusSpec:
      # -- prometheus image settings
      # quay.io/prometheus/prometheus:v3.6.0
      image:
        registry: quay.io
        repository: prometheus/prometheus
        tag: v3.6.0
      # -- Enable remote-write receiver so the OTel Collector can push metrics
      additionalArgs:
        - name: web.enable-remote-write-receiver
          value: ""
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 2Gi
      logLevel: warn
      # -- Watch ALL namespaces for ServiceMonitor and PodMonitor resources.
      # This allows ServiceMonitors deployed in the podiumd namespace to be
      # discovered by Prometheus running in the monitoring namespace.
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      retention: 7d # 7 days retention
      # Prometheus' data retention size. Supported units: B, KB, MB, GB, TB, PB, EB
      retentionSize: ""
      storageSpec:
        volumeClaimTemplate:
          metadata:
            name: db
          spec:
            storageClassName: managed-csi
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi
  prometheusOperator:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    # -- prometheus-operator image settings
    # quay.io/prometheus-operator/prometheus-operator:v0.90.1
    image:
      registry: quay.io
      repository: prometheus-operator/prometheus-operator
      tag: v0.90.1
      pullPolicy: IfNotPresent
    admissionWebhooks:
      # -- admission-webhook image settings (same release as the operator)
      # quay.io/prometheus-operator/admission-webhook:v0.90.1
      image:
        registry: quay.io
        repository: prometheus-operator/admission-webhook
        tag: v0.90.1
        pullPolicy: IfNotPresent
      patch:
        # -- kube-webhook-certgen image for admission webhook TLS certificate provisioning
        # ghcr.io/jkroepke/kube-webhook-certgen:1.8.0
        image:
          registry: ghcr.io
          repository: jkroepke/kube-webhook-certgen
          tag: "1.8.0"
          pullPolicy: IfNotPresent
    # -- prometheus-config-reloader image settings (injected into Prometheus StatefulSet by the operator)
    # quay.io/prometheus-operator/prometheus-config-reloader:v0.90.1
    prometheusConfigReloader:
      image:
        registry: quay.io
        repository: prometheus-operator/prometheus-config-reloader
        tag: v0.90.1
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 5m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
  # -- node-exporter image settings
  # quay.io/prometheus/node-exporter:v1.9.1
  prometheus-node-exporter:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    image:
      registry: quay.io
      repository: prometheus/node-exporter
      pullPolicy: IfNotPresent
      tag: v1.9.1
  # -- kube-state-metrics image settings
  # registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.17.0
  kube-state-metrics:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    image:
      registry: registry.k8s.io
      repository: kube-state-metrics/kube-state-metrics
      pullPolicy: IfNotPresent
      tag: v2.17.0

# -- Pushgateway: separate dependency (not bundled in kube-prometheus-stack).
# quay.io/prometheus/pushgateway:v1.11.1
prometheus-pushgateway:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  image:
    repository: quay.io/prometheus/pushgateway
    pullPolicy: IfNotPresent
    tag: v1.11.1

alloy:
  enabled: true
  alloy:
    extraEnv:
      - name: NODE_NAME
        valueFrom:
          fieldRef:
            fieldPath: spec.nodeName
    # -- configMap.content is processed by Helm tpl, so {{ .Release.Name }} is valid
    configMap:
      content: |
        // Discover all pods on the node
        discovery.kubernetes "pods" {
          role = "pod"
        }

        // Relabel: keep only pods on this node, drop terminated pods,
        // extract exact log path from pod UID, add k8s metadata.
        discovery.relabel "pod_logs" {
          targets = discovery.kubernetes.pods.targets

          // Only tail files for pods scheduled on this node
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            regex         = env("NODE_NAME")
            action        = "keep"
          }

          // Drop pods in terminal phases
          rule {
            source_labels = ["__meta_kubernetes_pod_phase"]
            regex         = "Pending|Succeeded|Failed|Completed"
            action        = "drop"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label  = "app"
          }

          // Build the exact log file path using pod UID — no wildcards, os.Stat requires a real path.
          // Use ${n} notation: $n_ would include the underscore in the capture group reference.
          rule {
            source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name", "__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
            separator     = "/"
            regex         = "(.+)/(.+)/(.+)/(.+)"
            replacement   = "/var/log/pods/${1}_${2}_${3}/${4}/0.log"
            target_label  = "__path__"
          }
        }

        // Tail log files, strip CRI prefix (containerd format: timestamp stream flags log)
        // and forward to Loki. Equivalent to Promtail's pipeline_stages: [cri: {}].
        loki.source.file "pod_logs" {
          targets    = discovery.relabel.pod_logs.output
          forward_to = [loki.process.cri.receiver]
        }

        loki.process "cri" {
          forward_to = [loki.write.loki_gateway.receiver]

          stage.cri {}
        }

        loki.write "loki_gateway" {
          endpoint {
            url       = "http://{{ .Release.Name }}-loki-gateway/loki/api/v1/push"
            tenant_id = "1"
          }
        }
    mounts:
      varlog: true
      dockercontainers: true
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        cpu: 100m
        memory: 256Mi
  # -- alloy image settings
  # docker.io/grafana/alloy:v1.14.0
  image:
    registry: docker.io
    repository: grafana/alloy
    tag: v1.14.0
    pullPolicy: IfNotPresent
  configReloader:
    # -- config-reloader sidecar image settings (Alloy hot-reload, separate from the operator's config-reloader)
    # quay.io/prometheus-operator/prometheus-config-reloader:v0.81.0
    image:
      registry: quay.io
      repository: prometheus-operator/prometheus-config-reloader
      tag: v0.81.0
      pullPolicy: IfNotPresent
loki:
