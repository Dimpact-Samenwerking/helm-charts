  lokiCanary:
    enabled: false
    # loki-canary image settings
    # docker.io/grafana/loki-canary:3.6.7
    # image is not used
    
   # image:
   #  pullPolicy: IfNotPresent
   #   tag: 3.5
  memcached:
    # memcached image settings
    # docker.io/library/memcached:alpine3.22
    image:
      pullPolicy: IfNotPresent
      tag: alpine3.22
  memcachedExporter:
    # memcached-exporter image settings
    # docker.io/prom/memcached-exporter:v0.15.3
    image:
      pullPolicy: IfNotPresent
      tag: v0.15.3

  resultsCache:
    enabled: true
    defaultValidity: 6h

  sidecar:
    # k8s-sidecar image settings
    # docker.io/kiwigrid/k8s-sidecar:1.30.10
    image:
      pullPolicy: IfNotPresent
      tag: 1.30.10


  chunksCache:
    enabled: true
    defaultValidity: 6h # Shorter TTL = fresher results
    allocatedMemory: 1024
  enterprise:
    # enterprise-logs image settings
    # docker.io/grafana/enterprise-logs:3.5.4
    image:
      pullPolicy: IfNotPresent
      tag: 3.5.4
    provisioner:
      # enterprise-logs-provisioner image settings
      # us-docker.pkg.dev/grafanalabs-global/docker-enterprise-provisioner-prod/enterprise-provisioner:3.5.2
      image:
        pullPolicy: IfNotPresent
        tag: 3.5.2

  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
    dashboards:
      enabled: false
    rules:
      enabled: false
  indexGateway:
    replicas: 2
    maxUnavailable: 1
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  queryScheduler:
    replicas: 2
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  queryFrontend:
    replicas: 2
    maxUnavailable: 1
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  distributor:
    replicas: 3
    maxUnavailable: 2
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  querier:
    replicas: 3
    maxUnavailable: 2
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  gateway:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    # nginx-unprivileged image settings
    # docker.io/nginxinc/nginx-unprivileged:alpine3.22-perl
    image:
      pullPolicy: IfNotPresent
      tag: alpine3.22-perl
  ingester:
    replicas: 3
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    zoneAwareReplication:
      zoneA: {}
      zoneB: {}
      zoneC: {}

  # kubectl image settings
  # registry.k8s.io/kubectl:v1.33.0
  kubectlImage:
    registry: registry.k8s.io
    repository: kubectl
    tag: v1.33.0
    pullPolicy: IfNotPresent
  test:
    enabled: false
    # loki-helm-test image settings
    # docker.io/grafana/loki-helm-test (not used)

    #  image:
    #    pullPolicy: IfNotPresent
    #     tag: ewelch-distributed-helm-chart-17db5ee
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  compactor:
    replicas: 1
  loki:
    auth_enabled: false
    schemaConfig:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    tracing:
      enabled: true
      
    storage:
      s3:
        endpoint: http://{{ .Release.Name }}-minio-svc:9000
        insecure: true
        s3forcepathstyle: true
      object_store:
        type: s3
        s3: 
          endpoint: http://{{ .Release.Name }}-minio-svc:9000
          insecure: true
        
    compactor:
      delete_request_store: s3
      compaction_interval: 10m
      retention_delete_delay: 2h
      retention_delete_worker_count: 150
      retention_enabled: true
      
      # -- Query Performance
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
      retention_period: 30d # 1 month retention
      max_query_lookback: 30d # 1 month query lookback
      ingestion_rate_strategy: local # Default: global
      max_global_streams_per_user: 5000
      max_query_length: 721h # 1 month. Default: 721h
      max_query_parallelism: 48 # Utilize Azure's high throughput
      max_streams_per_user: 0 # Old Default: 10000
      split_queries_by_interval: 15m # Smaller splits = faster parallelization
      max_cache_freshness_per_query: 10m
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
      otlp_config:
        resource_attributes:
          attributes_config:
            - regex: app
              action: index_label

    query_scheduler:
      # the TSDB index dispatches many more, but each individually smaller, requests.
      # We increase the pending request queue sizes to compensate.
      max_outstanding_requests_per_tenant: 32768
      
    ingester:
      chunk_encoding: snappy
      chunk_idle_period: 30m # Flush chunks faster = less memory
      chunk_block_size: 262144
      chunk_retain_period: 1m
      
    pattern_ingester:
      enabled: true
      
    querier:
      max_concurrent: 6 # Per-pod parallelism
      
    frontend:
      max_outstanding_per_tenant: 6144

    # loki image settings
    # docker.io/grafana/loki:3.6.7
    image:
      pullPolicy: IfNotPresent
      tag: 3.6.7
    

  minio:
    enabled: true
    global:
      # override registry for air-gapped environments:
      #image:
      #  registry: acrprodmgmt.azurecr.io
    persistence:
      storageClass: managed-csi
      size: 20Gi
    # minio image settings
    # quay.io/minio/minio:RELEASE.2025-07-23T15-54-02Z-cpuv1
    image:
      pullPolicy: IfNotPresent
      tag: RELEASE.2025-07-23T15-54-02Z-cpuv1
    # mc image settings
    # quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    mcImage:
      pullPolicy: IfNotPresent
      tag: RELEASE.2025-08-13T08-35-41Z-cpuv1

# -- Grafana Tempo: distributed tracing backend. Disabled by default.
# Enable with: tempo.enabled=true
# Requires opentelemetry-collector.enabled=true to receive traces via OTLP.
tempo:
  enabled: false
  persistence:
    enabled: true
    storageClassName: managed-csi
    size: 10Gi
  tempo:
    # -- tempo image settings
    # docker.io/grafana/tempo:2.9.0
    image:
      pullPolicy: IfNotPresent
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

# -- OpenTelemetry Collector: gateway deployment receiving OTLP from applications.
# Exports: logs → Loki, metrics → Prometheus, traces → Tempo (when enabled).
# Applications should send OTLP to <release-name>-opentelemetry-collector:4317 (gRPC)
# or <release-name>-opentelemetry-collector:4318 (HTTP).
# See otel.md for per-service instrumentation config.
# #OTel instrumentation
opentelemetry-collector:
  enabled: true
  mode: deployment
  image:
    # otel-collector image settings
    # ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.147.0
    # Using contrib (not k8s) — required for prometheusremotewrite exporter
    repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
    pullPolicy: IfNotPresent
  command:
    name: otelcol-contrib
  # -- Expose OTLP gRPC, HTTP and self-metrics ports
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      protocol: TCP
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      protocol: TCP
    metrics:
      enabled: true
      containerPort: 8888
      servicePort: 8888
      protocol: TCP
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8888"
    prometheus.io/path: "/metrics"
  # -- Inject release name so config can reference sibling chart services
  extraEnvs:
    - name: RELEASE_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.labels['app.kubernetes.io/instance']
    # -- Bearer token for the OTLP HTTP endpoint (port 4318).
    # Replace REP_OTEL_HTTP_AUTH_TOKEN_REP with the actual token value
    # or override this in your environment values file.
    - name: OTEL_HTTP_AUTH_TOKEN
      value: "REP_OTEL_HTTP_AUTH_TOKEN_REP"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  config:
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      # -- Bearer token auth for the OTLP HTTP receiver (port 4318).
      # Token is injected via the OTEL_HTTP_AUTH_TOKEN environment variable.
      bearertokenauth:
        token: "${env:OTEL_HTTP_AUTH_TOKEN}"
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
            auth:
              authenticator: bearertokenauth
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
      batch:
        timeout: 5s
        send_batch_size: 1000
    exporters:
      # -- Logs → Loki via OTLP (Loki 3.x native OTLP endpoint)
      otlphttp/loki:
        endpoint: http://${env:RELEASE_NAME}-loki-gateway/otlp
        headers:
          X-Scope-OrgID: "1"
      # -- Metrics → Prometheus remote write receiver
      prometheusremotewrite:
        endpoint: http://${env:RELEASE_NAME}-kube-prometheus-prometheus:9090/api/v1/write
        tls:
          insecure: true
    service:
      extensions: [health_check, bearertokenauth]
      telemetry:
        metrics:
          address: 0.0.0.0:8888
      pipelines:
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/loki]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheusremotewrite]
        # Traces pipeline is not defined here by default.
        # Apply values-enable-tempo.yaml to enable traces → Tempo.

# -- PodMonitor for Traefik. Scrapes the Traefik metrics endpoint (port 9100)
# from pods in the configured namespace. Requires Traefik to be deployed with
# --metrics.prometheus=true (default in the standard Traefik Helm chart).
traefikMonitor:
  enabled: true
  # -- Namespace where Traefik pods run. Leave empty to search all namespaces.
  namespace: ""
  # -- Prometheus scrape interval.
  scrapeInterval: 30s

# -- ServiceMonitor for the OpenTelemetry Collector internal metrics endpoint
# (port 8888). Allows Prometheus to scrape otelcol_* health/pipeline metrics.
otelCollectorMonitor:
  enabled: true
  # -- Prometheus scrape interval.
  scrapeInterval: 30s

# -- Ingress for the OTLP HTTP endpoint (port 4318).
# Exposes the collector externally via Traefik with an ip-allowlist middleware.
# Requires cert-manager for TLS. Disabled by default — set hostname to enable.
# The middleware must be pre-created in the same namespace (e.g. a Traefik Middleware CRD).
otelIngress:
  enabled: false
  # -- External hostname, e.g. otel.example.nl
  hostname: ""
  clusterIssuer: letsencrypt-prod
  tlsSecretName: otel-tls
  # -- Traefik middleware reference (namespace/name@kubernetescrd). Set to "" to disable.
  middleware: "{{ .Release.Namespace }}-otel-ip-allowlist@kubernetescrd"