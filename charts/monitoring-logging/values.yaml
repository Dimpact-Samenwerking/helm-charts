grafana:
  enabled: true
  assertNoLeakedSecrets: false
  nodeSelector:
    agentpool: userpool
  deleteDatasources:
    - name: Alertmanager
    
  datasources:
    alertmanager:
      enabled: false
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          editable: true
          type: prometheus
          readOnly: false
          url: http://{{ .Release.Name }}-prometheus-server
          access: proxy
          isDefault: false
        - name: loki
          type: loki
          uid: loki
          readOnly: false
          editable: true
          access: proxy
          isDefault: true
          url: http://{{ .Release.Name }}-loki-gateway
          version: 1
          jsonData:
            timeout: 300
        # -- Tempo datasource: requires tempo.enabled=true
        - name: Tempo
          type: tempo
          uid: tempo
          readOnly: false
          editable: true
          access: proxy
          isDefault: false
          url: http://{{ .Release.Name }}-tempo:3200
          jsonData:
            tracesToLogsV2:
              datasourceUid: loki
              filterByTraceID: true
              filterBySpanID: false
            tracesToMetrics:
              datasourceUid: prometheus
            serviceMap:
              datasourceUid: prometheus
            nodeGraph:
              enabled: true
  # -- curl image settings
  downloadDashboardsImage:
    pullPolicy: IfNotPresent
    sha: ""
    tag: 8.16.0     

  containerSecurityContext:
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    
 # -- Dashboard voor gemeenten
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "default"
          orgId: 1
          folder: 'PodiumD_Monitoring_Logging'
          type: file
          disableDeletion: false
          updateIntervalSeconds: 30
          allowUiUpdates: true # modify dashboards
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

# -- Dashboard voor logs
        - name: "logs"
          orgId: 2
          folder: 'PodiumD_Monitoring_Logging'
          type: file
          disableDeletion: false
          updateIntervalSeconds: 30
          allowUiUpdates: true # modify dashboards
          editable: true
          options:
            path: /var/lib/grafana/dashboards/logs

  # -- Dashboard opgenomen in ConfigMap
  dashboardsConfigMaps:
    default: "logging-main-dashboard"
    logs: "logging-logs"
  
  grafana.ini:
    # -- Authentication and Authorization with Keycloak
    auth.generic_oauth:
      enabled: true
      name: Keycloak-podiumd
      allow_sign_up: true
      allow_assign_grafana_admin: true
      client_id: ""
      client_secret: ""
      scopes: openid email profile offline_access roles
      email_attribute_path: email
      login_attribute_path: username
      name_attribute_path: name
      auth_url: "https://keycloak.test.nl/realms/podiumd/protocol/openid-connect/auth"
      token_url: "https://keycloak.test.nl/realms/podiumd/protocol/openid-connect/token"
      api_url: "https://keycloak.test.nl/realms/podiumd/protocol/openid-connect/userinfo"
      role_attribute_path: "contains(monitoring_roles[*], 'admin') && 'Admin' || contains(monitoring_roles[*], 'editor') && 'Editor' || 'Viewer'"
      role_attribute_strict: false
      org_mapping: "*:Viewer"
      skip_org_role_sync: false
      groups_attribute_path: groups
      use_refresh_token: true
      sync_ttl: 60
      use_pkce: true
    auth:
      oauth_skip_org_role_update_sync: false
      oauth_auto_login: true
      disable_login_form: true
      disable_signout_menu: false
      allow_sign_up: true
    server:
      domain: "logs.test.nl"
      enforce_domain: true
      root_url: "https://logs.test.nl/"
    metrics:
      enabled: false  
    security:
      cookie_secure: true
      cookie_samesite: lax
      content_security_policy: true
      content_security_policy_template: "script-src 'self' 'unsafe-eval' 'unsafe-inline' 'strict-dynamic' $NONCE;object-src 'none';font-src 'self';style-src 'self' 'unsafe-inline' blob:;img-src * data:;base-uri 'self';connect-src 'self' grafana.com ws://$ROOT_PATH wss://$ROOT_PATH;manifest-src 'self';media-src 'none';form-action 'self';"
      hide_version: true
    auth.anonymous:
      enabled: false     # Ensure anonymous access is disabled
      hide_version: true # Add this to explicitly hide version for anonymous users
      
    # -- Git Sync for Grafana dashboards
    feature_toggles:
      provisioning: true
      grafanaAdvisor: true
      kubernetesClientDashboardsFolders: true
      kubernetesDashboards: true
      grafanaAPIServerEnsureKubectlAccess: true
  # -- Grafana image settings
  image:
    pullPolicy: IfNotPresent
    tag: 12.3.0-17814087142-ubuntu

  initChownData:
    # -- Busybox image settings
    image:
      pullPolicy: IfNotPresent
      tag: 1.37.0-uclibc

  imageRenderer:
    # -- Grafana image renderer settings
    image:
      pullPolicy: Always
      tag: v4.0.14
  testFramework:
    # -- bats image settings
    image:
      tag: 1.12.0
    imagePullPolicy: IfNotPresent
  persistence:
    enabled: true
    storageClassName: "managed-csi" # Specify your storage class
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    type: pvc
    finalizers:
      - kubernetes.io/pvc-protection
      
  sidecar:
    datasources:
      alertmanager:
        enabled: false

prometheus:
  enabled: true
  server:
    # -- prometheus image settings
    image:
      tag: v3.6.0
    extraFlags:
      - web.enable-remote-write-receiver
    persistentVolume:
      enabled: true
      storageClass: "managed-csi"
      size: 20Gi
      accessModes: ["ReadWriteOnce"]
    nodeSelector:
      agentpool: userpool
  prometheusSpec:
    logLevel: warn
    serviceMonitorSelectorNilUsesHelmValues: false
    retention: 7d # 7 days retention
    # Prometheus' data retention size. Supported units: B, KB, MB, GB, TB, PB, EB
    retentionSize: ""
  alertmanager:
    enabled: false
  prometheus-node-exporter:
    nodeSelector:
      agentpool: userpool
    # node-exporter image settings
    image:
      pullPolicy: IfNotPresent
      tag: v1.9.1
    kubeRBACProxy:
      # kube-rbac-proxy image settings
      image:
        pullPolicy: IfNotPresent
        tag: 0.19.1
  prometheus-pushgateway:
    nodeSelector:
      agentpool: userpool
    # pushgateway image settings
    image:
      pullPolicy: IfNotPresent
      tag: v1.11.1
  kube-state-metrics:
    nodeSelector:
      agentpool: userpool
    # kube-state-metrics image settings
    image:
      pullPolicy: IfNotPresent
      tag: v2.17.0
  configmapReload:
    prometheus:
      # prometheus-config-reloader image settings
      image:
        tag: v0.85.0

alloy:
  enabled: true
  nodeSelector:
    agentpool: userpool
  alloy:
    # -- configMap.content is processed by Helm tpl, so {{ .Release.Name }} is valid
    configMap:
      content: |
        // Discover all pods on the node
        discovery.kubernetes "pods" {
          role = "pod"
        }

        // Relabel: drop terminated pods, extract log path, add k8s metadata labels
        discovery.relabel "pod_logs" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_pod_phase"]
            regex         = "Pending|Succeeded|Failed|Completed"
            action        = "drop"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label  = "app"
          }

          // Build the log file path from pod UID and container name
          rule {
            source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
            separator     = "/"
            regex         = "(.+)/(.+)"
            replacement   = "/var/log/pods/*_*_$1/$2/*.log"
            target_label  = "__path__"
          }
        }

        // Tail log files and forward to Loki
        loki.source.file "pod_logs" {
          targets    = discovery.relabel.pod_logs.output
          forward_to = [loki.write.loki_gateway.receiver]
        }

        loki.write "loki_gateway" {
          endpoint {
            url       = "http://{{ .Release.Name }}-loki-gateway/loki/api/v1/push"
            tenant_id = "1"
          }
        }
    mounts:
      varlog: true
      dockercontainers: true
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        cpu: 100m
        memory: 256Mi
  image:
    pullPolicy: IfNotPresent
loki:
  enabled: true
  # loki image settings
  #global:
  #  image:
  #    registry: acrprodmgmt.azurecr.io
  deploymentMode: Distributed
  lokiCanary:
    enabled: false
    # loki-canary image settings
    # image is not used
    
   # image:
   #  pullPolicy: IfNotPresent
   #   tag: 3.5
  memcached:
    # memcached image settings
    image:
      pullPolicy: IfNotPresent
      tag: alpine3.22
  memcachedExporter:
    # memcached-export image settings
    image:
      pullPolicy: IfNotPresent
      tag: v0.15.3

  resultsCache:
    enabled: true
    defaultValidity: 6h
    nodeSelector:
      agentpool: userpool

  sidecar:
    # k8s-sidecar image settings
    image:
      pullPolicy: IfNotPresent
      tag: 1.30.10


  chunksCache:
    enabled: true
    defaultValidity: 6h # Shorter TTL = fresher results
    allocatedMemory: 1024
    nodeSelector:
      agentpool: userpool
  enterprise:
    # enterprise-logs image settings
    image:
      pullPolicy: IfNotPresent
      tag: 3.5.4
