    global:
      # minio image settings
      #image:
      #  registry: acrprodmgmt.azurecr.io
    persistence:
      storageClass: managed-csi
      size: 20Gi
    nodeSelector:
      agentpool: userpool
    # minio image settings
    image:
      pullPolicy: IfNotPresent
      tag: RELEASE.2025-07-23T15-54-02Z-cpuv1
    # mc image settings
    mcImage:
      pullPolicy: IfNotPresent
      tag: RELEASE.2025-08-13T08-35-41Z-cpuv1

# -- Grafana Tempo: distributed tracing backend. Disabled by default.
# Enable with: tempo.enabled=true
# Requires opentelemetry-collector.enabled=true to receive traces via OTLP.
tempo:
  enabled: false
  nodeSelector:
    agentpool: userpool
  persistence:
    enabled: true
    storageClassName: managed-csi
    size: 10Gi
  tempo:
    # -- tempo image settings
    image:
      pullPolicy: IfNotPresent
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

# -- OpenTelemetry Collector: gateway deployment receiving OTLP from applications.
# Exports: logs → Loki, metrics → Prometheus, traces → Tempo (when enabled).
# Applications should send OTLP to <release-name>-opentelemetry-collector:4317 (gRPC)
# or <release-name>-opentelemetry-collector:4318 (HTTP).
opentelemetry-collector:
  enabled: true
  mode: deployment
  image:
    repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s
    pullPolicy: IfNotPresent
  command:
    name: otelcol-k8s
  nodeSelector:
    agentpool: userpool
  # -- Expose OTLP gRPC and HTTP ports
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      protocol: TCP
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      protocol: TCP
  # -- Inject release name so config can reference sibling chart services
  extraEnv:
    - name: RELEASE_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.labels['app.kubernetes.io/instance']
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
      batch:
        timeout: 5s
        send_batch_size: 1000
    exporters:
      # -- Logs → Loki via OTLP (Loki 3.x native OTLP endpoint)
      otlphttp/loki:
        endpoint: http://${env:RELEASE_NAME}-loki-gateway/otlp
        headers:
          X-Scope-OrgID: "1"
      # -- Metrics → Prometheus remote write receiver
      prometheusremotewrite:
        endpoint: http://${env:RELEASE_NAME}-prometheus-server/api/v1/write
        tls:
          insecure: true
      # -- Traces → Tempo (only active when tempo.enabled=true)
      otlp/tempo:
        endpoint: ${env:RELEASE_NAME}-tempo:4317
        tls:
          insecure: true
    service:
      pipelines:
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/loki]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheusremotewrite]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/tempo]