name: Test values.yaml with podiumd helm chart

on:
  workflow_dispatch:

jobs:
  Powershell:
    runs-on: ubuntu-latest
    env:
      branch_name: ${{ github.head_ref || github.ref_name }}
    steps:
    - name: checkout
      uses: actions/checkout@v6

    - name: install helm
      uses: azure/setup-helm@v5.0.1

    - name: assert keycloak digest consistency
      shell: bash
      # The Keycloak 26.6.3 digest is pinned in two places and hand-synced:
      #   keycloak.image.tag                              -> "26.6.3@sha256:<digest>"
      #   keycloak-operator.config.keycloakImage.sha      -> "<digest>"
      # Fail the build if they drift out of sync on a future bump.
      run: |
        V=charts/podiumd/values.yaml
        embedded=$(yq -r '.keycloak.image.tag' "$V" | sed -n 's/.*@sha256:\([0-9a-f]\{64\}\).*/\1/p')
        split=$(yq -r '.["keycloak-operator"].config.keycloakImage.sha' "$V")
        echo "embedded=$embedded"
        echo "split=$split"
        if [ -z "$embedded" ] || [ "$embedded" != "$split" ]; then
          echo "::error file=$V::keycloak.image.tag digest ($embedded) != keycloak-operator.config.keycloakImage.sha ($split)"
          exit 1
        fi

    - name: add required helm repository
      shell: bash
      run: |
        helm repo add dimpact https://Dimpact-Samenwerking.github.io/helm-charts/
        helm repo add kiss-elastic https://raw.githubusercontent.com/Klantinteractie-Servicesysteem/.github/main/docs/scripts/elastic
        helm repo add maykinmedia https://maykinmedia.github.io/charts/
        helm repo add zgw-office-addin https://infonl.github.io/zgw-office-addin
        helm repo add zac https://infonl.github.io/dimpact-zaakafhandelcomponent/
        helm repo add worth-nl https://worth-nl.github.io/helm-charts
        helm repo add adfinis https://charts.adfinis.com
        helm repo add wiremind https://wiremind.github.io/wiremind-helm-charts
        helm repo add opstree https://ot-container-kit.github.io/helm-charts/
        helm repo add apisix https://charts.apiseven.com

    - name: bake deployment
      id: bake
      uses: azure/k8s-bake@v4
      with:
        renderEngine: "helm"
        releaseName: github-test
        helmChart: 'charts/podiumd'
        namespace: podiumd
        # k8s-bake runs `helm dependency update` then `helm template ... -f <overrideFiles>`.
        # ci/lint-values.yaml supplies dummy secrets/URLs so schema + `required`/`fail`
        # template guards pass without real values (same file used by `helm lint`).
        overrideFiles: |
          charts/podiumd/ci/lint-values.yaml

